<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - 资产管家</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo h1 {
            font-size: 28px;
            color: #fff;
            margin-bottom: 8px;
        }
        .logo p {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: rgba(255,255,255,0.7);
            margin-bottom: 8px;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.04);
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }
        .form-group input:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139,92,246,0.1);
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(139,92,246,0.3);
        }
        .error {
            color: #ef4444;
            text-align: center;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }
        .accounts {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .accounts h3 {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            margin-bottom: 16px;
        }
        .account-list {
            display: grid;
            gap: 10px;
        }
        .account-item {
            padding: 12px 14px;
            background: rgba(255,255,255,0.04);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .account-item:hover {
            background: rgba(139,92,246,0.1);
        }
        .account-item .name {
            color: #fff;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .account-item .creds {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🏡 资产管家</h1>
            <p>家庭资产管理平台</p>
        </div>

        <div id="error" class="error"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" autocomplete="username">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary">登录</button>
        </form>

        <div class="accounts">
            <h3>快速选择测试账号</h3>
            <div class="account-list">
                <div class="account-item" data-user="admin" data-pass="admin123">
                    <div class="name">系统管理员</div>
                    <div class="creds">admin / admin123</div>
                </div>
                <div class="account-item" data-user="head" data-pass="head123">
                    <div class="name">户主</div>
                    <div class="creds">head / head123</div>
                </div>
                <div class="account-item" data-user="member" data-pass="member123">
                    <div class="name">家庭成员</div>
                    <div class="creds">member / member123</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorDiv = document.getElementById('error');

        document.querySelectorAll('.account-item').forEach(item => {
            item.addEventListener('click', () => {
                usernameInput.value = item.dataset.user;
                passwordInput.value = item.dataset.pass;
            });
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                errorDiv.textContent = '请输入用户名和密码';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    const user = data.user;
                    if (user.role === 'admin') {
                        window.location.href = '/dashboard.html';
                    } else {
                        window.location.href = '/dashboard.html';
                    }
                } else {
                    errorDiv.textContent = data.message;
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = '网络错误，请稍后重试';
                errorDiv.style.display = 'block';
            }
        });

        // 检查是否已登录
        const token = localStorage.getItem('token');
        if (token) {
            window.location.href = '/dashboard.html';
        }
    </script>
</body>
</html>
