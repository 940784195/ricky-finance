<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>资产记录 - 资产管家</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="js/excel-export.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/gridstack.js/7.2.3/gridstack.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gridstack.js/7.2.3/gridstack-all.js"></script>
  <style>
    :root {
      --color-pageBackground: #0f0f1a;
      --color-pageBackgroundModalActive: rgba(0, 0, 0, 0.5);
      --color-pageText: #eaeaea;
      --color-pageTextLight: #b8b8d0;
      --color-pageTextSubdued: #6b6b80;
      --color-pageTextPositive: #4ade80;
      --color-pageTextNegative: #f87171;
      --color-pageTextLink: #a78bfa;
      --color-cardBackground: #1a1a2e;
      --color-cardBorder: #2a2a4a;
      --color-cardShadow: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24);
      --color-sidebarBackground: #16162a;
      --color-sidebarItemBackgroundHover: rgba(167, 139, 250, 0.1);
      --color-sidebarItemText: #8b8b8b;
      --color-sidebarItemTextSelected: #a78bfa;
      --color-buttonPrimaryBackground: #8b5cf6;
      --color-buttonPrimaryBackgroundHover: #7c3aed;
      --color-buttonPrimaryText: #ffffff;
      --color-buttonPrimaryBorder: #9d4edd;
      --color-buttonNormalBackground: transparent;
      --color-buttonNormalBackgroundHover: rgba(255, 255, 255, 0.05);
      --color-buttonNormalText: #eaeaea;
      --color-buttonNormalBorder: #2a2a4a;
      --color-buttonDangerBackground: rgba(248, 113, 113, 0.15);
      --color-buttonDangerBackgroundHover: rgba(248, 113, 113, 0.25);
      --color-buttonDangerText: #f87171;
      --color-buttonDangerBorder: rgba(248, 113, 113, 0.3);
      --color-inputBackground: #16162a;
      --color-inputBackgroundFocus: #1a1a3a;
      --color-inputText: #eaeaea;
      --color-inputPlaceholder: #6b6b80;
      --color-inputBorder: #2a2a4a;
      --color-inputBorderFocus: #8b5cf6;
      --color-modalBackground: #1a1a2e;
      --color-modalBorder: #2a2a4a;
      --color-modalHeaderBackground: rgba(255, 255, 255, 0.03);
      --color-modalFooterBackground: rgba(255, 255, 255, 0.03);
      --color-highlightBorder: #4ade80;
      --color-stockType: #f59e0b;
      --color-fundType: #3b82f6;
      --color-bondType: #10b981;
      --color-realestateType: #ec4899;
      --color-cashType: #6366f1;
      --color-otherType: #6b7280;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--color-pageBackground);
      color: var(--color-pageText);
      line-height: 1.6;
    }

    .app-layout {
      display: flex;
      height: 100%;
    }

    .sidebar {
      width: 260px;
      background: var(--color-sidebarBackground);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--color-cardBorder);
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--color-cardBorder);
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sidebar-brand i {
      font-size: 24px;
      color: var(--color-buttonPrimaryBackground);
    }

    .sidebar-brand h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--color-pageText);
    }

    .sidebar-nav {
      flex: 1;
      padding: 12px 0;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      cursor: pointer;
      color: var(--color-sidebarItemText);
      transition: all 0.2s ease;
      border-left: 2px solid transparent;
    }

    .nav-item:hover {
      background: var(--color-sidebarItemBackgroundHover);
      color: var(--color-pageText);
    }

    .nav-item.active {
      background: var(--color-sidebarItemBackgroundHover);
      color: var(--color-sidebarItemTextSelected);
      border-left-color: var(--color-buttonPrimaryBackground);
    }

    .nav-item i {
      width: 18px;
      font-size: 16px;
    }

    .sidebar-divider {
      height: 1px;
      background: var(--color-cardBorder);
      margin: 8px 0;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: var(--color-cardBackground);
      border-bottom: 1px solid var(--color-cardBorder);
    }

    .header-title h2 {
      font-size: 20px;
      font-weight: 600;
      color: var(--color-pageText);
      margin-bottom: 2px;
    }

    .header-title p {
      font-size: 13px;
      color: var(--color-pageTextSubdued);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--color-inputBackground);
      border: 1px solid var(--color-inputBorder);
      border-radius: 8px;
      padding: 8px 14px;
      min-width: 240px;
      transition: all 0.2s ease;
    }

    .search-box:focus-within {
      border-color: var(--color-inputBorderFocus);
      background: var(--color-inputBackgroundFocus);
    }

    .search-box i {
      color: var(--color-pageTextSubdued);
      font-size: 14px;
    }

    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--color-pageText);
      font-size: 14px;
      flex: 1;
    }

    .search-box input::placeholder {
      color: var(--color-inputPlaceholder);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--color-buttonPrimaryBackground);
      color: var(--color-buttonPrimaryText);
      border: 1px solid var(--color-buttonPrimaryBorder);
    }

    .btn-primary:hover {
      background: var(--color-buttonPrimaryBackgroundHover);
      transform: translateY(-0.5px);
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    }

    .btn-normal {
      background: var(--color-buttonNormalBackground);
      color: var(--color-buttonNormalText);
      border: 1px solid var(--color-buttonNormalBorder);
    }

    .btn-normal:hover {
      background: var(--color-buttonNormalBackgroundHover);
      border-color: var(--color-inputBorderFocus);
    }

    .btn-danger {
      background: var(--color-buttonDangerBackground);
      color: var(--color-buttonDangerText);
      border: 1px solid var(--color-buttonDangerBorder);
    }

    .btn-danger:hover {
      background: var(--color-buttonDangerBackgroundHover);
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 13px;
    }

    .header-user {
      display: flex;
      align-items: center;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--color-buttonPrimaryBackground), #6366f1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
      color: white;
    }

    .page-content {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .stats-card {
      background: var(--color-cardBackground);
      border: 1px solid var(--color-cardBorder);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stats-card-header {
      font-size: 13px;
      color: var(--color-pageTextSubdued);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stats-card-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--color-pageText);
    }

    .stats-card-change {
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 4px;
      font-weight: 500;
    }

    .stats-card-change.positive {
      color: var(--color-pageTextPositive);
    }

    .stats-card-change.negative {
      color: var(--color-pageTextNegative);
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: transparent;
      border: 1px solid var(--color-cardBorder);
      border-radius: 8px;
      color: var(--color-pageTextSubdued);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab:hover {
      background: var(--color-cardBackground);
      color: var(--color-pageText);
    }

    .tab.active {
      background: var(--color-cardBackground);
      border-color: var(--color-buttonPrimaryBackground);
      color: var(--color-buttonPrimaryText);
    }

    .filter-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: var(--color-cardBackground);
      border: 1px solid var(--color-cardBorder);
      border-radius: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-label {
      font-size: 13px;
      color: var(--color-pageTextSubdued);
      font-weight: 500;
    }

    .filter-select {
      background: var(--color-inputBackground);
      border: 1px solid var(--color-inputBorder);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--color-pageText);
      font-size: 13px;
      outline: none;
      cursor: pointer;
      min-width: 120px;
      transition: all 0.2s ease;
    }

    .filter-select:focus {
      border-color: var(--color-inputBorderFocus);
    }

    .filter-select option {
      background: var(--color-inputBackground);
      color: var(--color-pageText);
    }

    .filter-date {
      background: var(--color-inputBackground);
      border: 1px solid var(--color-inputBorder);
      border-radius: 8px;
      padding: 7px 10px;
      color: var(--color-pageText);
      font-size: 13px;
      outline: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .filter-date:focus {
      border-color: var(--color-inputBorderFocus);
    }

    .asset-records {
      background: var(--color-cardBackground);
      border: 1px solid var(--color-cardBorder);
      border-radius: 12px;
      overflow: hidden;
    }

    .records-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--color-cardBorder);
    }

    .records-header > div {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .records-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--color-pageText);
    }

    .records-count {
      font-size: 13px;
      color: var(--color-pageTextSubdued);
      background: var(--color-inputBackground);
      padding: 3px 10px;
      border-radius: 20px;
    }

    .records-actions {
      display: flex;
      gap: 8px;
    }

    .record-row {
      display: grid;
      grid-template-columns: 1.8fr 0.8fr 1fr 0.8fr 0.8fr 0.8fr 0.8fr;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--color-cardBorder);
      align-items: center;
      transition: all 0.2s ease;
      cursor: default;
    }

    .record-row:hover {
      background: var(--color-tableRowBackgroundHover);
    }

    .record-row.highlight {
      background: var(--color-tableRowBackgroundHighlight);
      border-left: 3px solid var(--color-highlightBorder);
    }

    .record-cell {
      font-size: 14px;
    }

    .record-cell.large {
      min-width: 180px;
    }

    .record-cell.small {
      min-width: 100px;
    }

    .record-cell.right {
      text-align: right;
    }

    .record-cell.center {
      text-align: center;
    }

    .record-customer {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .record-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--color-buttonPrimaryBackground), #6366f1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 13px;
      color: white;
      flex-shrink: 0;
    }

    .record-customer-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .record-customer-name {
      font-weight: 500;
      color: var(--color-pageText);
    }

    .record-customer-id {
      font-size: 12px;
      color: var(--color-pageTextSubdued);
    }

    .record-type {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      text-transform: capitalize;
    }

    .record-type.stock {
      background: rgba(245, 158, 11, 0.15);
      color: var(--color-stockType);
    }

    .record-type.fund {
      background: rgba(59, 130, 246, 0.15);
      color: var(--color-fundType);
    }

    .record-type.bond {
      background: rgba(16, 185, 129, 0.15);
      color: var(--color-bondType);
    }

    .record-type.realestate {
      background: rgba(236, 72, 153, 0.15);
      color: var(--color-realestateType);
    }

    .record-type.cash {
      background: rgba(99, 102, 241, 0.15);
      color: var(--color-cashType);
    }

    .record-type.other {
      background: rgba(107, 114, 128, 0.15);
      color: var(--color-otherType);
    }

    .record-value {
      font-weight: 600;
      color: var(--color-pageText);
    }

    .record-change {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-weight: 600;
      font-size: 13px;
    }

    .record-change.positive {
      color: var(--color-pageTextPositive);
    }

    .record-change.negative {
      color: var(--color-pageTextNegative);
    }

    .record-date {
      color: var(--color-pageTextLight);
    }

    .record-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
    }

    .record-status.valid {
      color: var(--color-pageTextPositive);
    }

    .record-status.pending {
      color: #f59e0b;
    }

    .record-status.invalid {
      color: var(--color-pageTextNegative);
    }

    .record-actions-cell {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .record-action-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--color-cardBorder);
      background: transparent;
      color: var(--color-pageTextSubdued);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      opacity: 0;
    }

    .record-row:hover .record-action-btn {
      opacity: 1;
    }

    .record-action-btn:hover {
      background: var(--color-buttonNormalBackgroundHover);
      color: var(--color-pageText);
      border-color: var(--color-inputBorderFocus);
    }

    .record-action-btn.delete:hover {
      background: var(--color-buttonDangerBackground);
      color: var(--color-buttonDangerText);
      border-color: var(--color-buttonDangerBorder);
    }

    .empty-state {
      padding: 60px 20px;
      text-align: center;
    }

    .empty-icon {
      font-size: 48px;
      color: var(--color-pageTextSubdued);
      margin-bottom: 16px;
    }

    .empty-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--color-pageText);
      margin-bottom: 8px;
    }

    .empty-message {
      font-size: 14px;
      color: var(--color-pageTextSubdued);
      margin-bottom: 20px;
    }

    .empty-action {
      display: inline-block;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--color-pageBackgroundModalActive);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--color-modalBackground);
      border: 1px solid var(--color-modalBorder);
      border-radius: 12px;
      width: 90%;
      max-width: 520px;
      overflow: hidden;
      transform: scale(0.95) translateY(20px);
      transition: all 0.3s ease;
    }

    .modal-overlay.active .modal {
      transform: scale(1) translateY(0);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: var(--color-modalHeaderBackground);
      border-bottom: 1px solid var(--color-cardBorder);
    }

    .modal-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--color-pageText);
    }

    .modal-close {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--color-pageTextSubdued);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .modal-close:hover {
      background: var(--color-buttonNormalBackgroundHover);
      color: var(--color-pageText);
    }

    .modal-body {
      padding: 20px;
      max-height: 60vh;
      overflow-y: auto;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 16px 20px;
      background: var(--color-modalFooterBackground);
      border-top: 1px solid var(--color-cardBorder);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--color-pageText);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .form-label.required::after {
      content: '*';
      color: var(--color-pageTextNegative);
    }

    .form-input, .form-select, .form-textarea {
      background: var(--color-inputBackground);
      border: 1px solid var(--color-inputBorder);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--color-inputText);
      font-size: 14px;
      outline: none;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--color-inputBorderFocus);
      background: var(--color-inputBackgroundFocus);
    }

    .form-input::placeholder, .form-textarea::placeholder {
      color: var(--color-inputPlaceholder);
    }

    .form-textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-input:disabled, .form-select:disabled, .form-textarea:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .modal-alert {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 16px;
      border-radius: 8px;
    }

    .modal-alert.warning {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.2);
    }

    .modal-alert i {
      font-size: 20px;
      color: #f59e0b;
      flex-shrink: 0;
    }

    .modal-alert span {
      font-size: 14px;
      color: var(--color-pageTextLight);
      line-height: 1.6;
    }

    .timeline-container {
      background: var(--color-cardBackground);
      border: 1px solid var(--color-cardBorder);
      border-radius: 12px;
      padding: 20px;
    }

    .timeline-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .timeline-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--color-pageText);
    }

    .timeline-subtitle {
      font-size: 13px;
      color: var(--color-pageTextSubdued);
    }

    .timeline {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .timeline-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 16px;
      background: var(--color-inputBackground);
      border-radius: 10px;
      border-left: 3px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .timeline-item:hover {
      background: var(--color-tableRowBackgroundHover);
    }

    .timeline-item.positive {
      border-left-color: var(--color-pageTextPositive);
    }

    .timeline-item.negative {
      border-left-color: var(--color-pageTextNegative);
    }

    .timeline-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .timeline-customer {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .timeline-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--color-buttonPrimaryBackground), #6366f1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 12px;
      color: white;
    }

    .timeline-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .timeline-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--color-pageText);
    }

    .timeline-type {
      font-size: 12px;
      color: var(--color-pageTextSubdued);
    }

    .timeline-date {
      font-size: 12px;
      color: var(--color-pageTextSubdued);
    }

    .timeline-body {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .timeline-value {
      font-size: 16px;
      font-weight: 600;
      color: var(--color-pageText);
    }

    .timeline-change {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-weight: 600;
      font-size: 13px;
    }

    .timeline-change.positive {
      color: var(--color-pageTextPositive);
    }

    .timeline-change.negative {
      color: var(--color-pageTextNegative);
    }

    .timeline-note {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 13px;
      color: var(--color-pageTextLight);
      padding-top: 4px;
      border-top: 1px solid var(--color-cardBorder);
    }

    .timeline-note i {
      color: var(--color-pageTextSubdued);
      font-size: 12px;
      margin-top: 2px;
    }

    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 2000;
    }

    .toast {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--color-cardBackground);
      border: 1px solid var(--color-cardBorder);
      border-radius: 10px;
      min-width: 280px;
      max-width: 400px;
      animation: slideIn 0.3s ease;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .toast.slide-out {
      animation: slideOut 0.2s ease;
    }

    .toast i {
      font-size: 16px;
      flex-shrink: 0;
    }

    .toast.success i {
      color: var(--color-pageTextPositive);
    }

    .toast.error i {
      color: var(--color-pageTextNegative);
    }

    .toast.info i {
      color: var(--color-pageTextLink);
    }

    .toast-message {
      font-size: 14px;
      color: var(--color-pageText);
      flex: 1;
    }

    .toast-close {
      background: none;
      border: none;
      color: var(--color-pageTextSubdued);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: all 0.2s ease;
    }

    .toast-close:hover {
      background: var(--color-buttonNormalBackgroundHover);
      color: var(--color-pageText);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(100px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes slideOut {
      from {
        opacity: 1;
        transform: translateX(0);
      }
      to {
        opacity: 0;
        transform: translateX(100px);
      }
    }

    @media (max-width: 1024px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .record-row {
        grid-template-columns: 1fr;
        text-align: left !important;
        gap: 10px;
      }
      .record-cell.right, .record-cell.center {
        text-align: left;
      }
      .record-actions-cell {
        justify-content: flex-start;
      }
    }

    .dashboard-toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    .dashboard-toolbar .btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid var(--color-cardBorder);
      background: var(--color-cardBackground);
      color: var(--color-pageText);
    }

    .dashboard-toolbar .btn:hover {
      background: var(--color-sidebarItemBackgroundHover);
      border-color: var(--color-buttonPrimaryBackground);
    }

    .dashboard-toolbar .btn-primary {
      background: var(--color-buttonPrimaryBackground);
      border-color: var(--color-buttonPrimaryBorder);
      color: var(--color-buttonPrimaryText);
    }

    .dashboard-toolbar .btn-primary:hover {
      background: var(--color-buttonPrimaryBackgroundHover);
    }

    .dashboard-toolbar .btn-danger {
      color: var(--color-buttonDangerText);
    }

    .dashboard-toolbar .btn-danger:hover {
      background: var(--color-buttonDangerBackground);
      border-color: var(--color-buttonDangerBorder);
    }

    .add-chart-wrapper {
      position: relative;
    }

    .add-chart-menu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      margin-top: 4px;
      background: var(--color-cardBackground);
      border: 1px solid var(--color-cardBorder);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      z-index: 1000;
      min-width: 200px;
      padding: 6px 0;
    }

    .add-chart-menu.open {
      display: block;
    }

    .add-chart-menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 13px;
      color: var(--color-pageText);
      transition: background 0.15s ease;
    }

    .add-chart-menu-item:hover {
      background: var(--color-sidebarItemBackgroundHover);
    }

    .add-chart-menu-item i {
      width: 18px;
      text-align: center;
      font-size: 14px;
      color: var(--color-buttonPrimaryBackground);
    }

    .grid-stack {
      margin-bottom: 20px;
    }

    .grid-stack > .grid-stack-item {
      min-width: 200px;
      min-height: 200px;
    }

    .grid-stack > .grid-stack-item > .grid-stack-item-content {
      background: var(--color-cardBackground) !important;
      border: 1px solid var(--color-cardBorder);
      border-radius: 12px !important;
      overflow: hidden !important;
      display: flex;
      flex-direction: column;
    }

    .grid-stack > .grid-stack-item > .grid-stack-item-content > .chart-card {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--color-cardBorder);
      flex-shrink: 0;
    }

    .chart-header-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chart-header-title i {
      color: var(--color-buttonPrimaryBackground);
      font-size: 14px;
    }

    .chart-header h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-pageText);
    }

    .chart-header-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .chart-controls {
      display: flex;
      gap: 6px;
    }

    .chart-delete-btn {
      background: none;
      border: none;
      color: var(--color-pageTextSubdued);
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      font-size: 14px;
      transition: all 0.15s ease;
      line-height: 1;
    }

    .chart-delete-btn:hover {
      color: var(--color-buttonDangerText);
      background: var(--color-buttonDangerBackground);
    }

    .chart-container {
      padding: 16px;
      flex: 1;
      min-height: 0;
      position: relative;
    }

    .chart-container canvas {
      width: 100% !important;
      height: 100% !important;
    }

    .gs-resize-handle {
      background-image: none !important;
    }

    .gs-resize-handle::after {
      content: '';
      position: absolute;
      right: 3px;
      bottom: 3px;
      width: 10px;
      height: 10px;
      border-right: 2px solid var(--color-pageTextSubdued);
      border-bottom: 2px solid var(--color-pageTextSubdued);
    }

    @media (max-width: 1024px) {
      .grid-stack {
        grid-template-columns: repeat(12, 1fr) !important;
      }
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
        position: fixed;
        z-index: 900;
        left: -100%;
        transition: left 0.3s ease;
      }
      .sidebar.open {
        left: 0;
      }
      .stats-grid {
        grid-template-columns: 1fr;
      }
      .header {
        flex-direction: column;
        gap: 12px;
        align-items: stretch;
      }
      .header-actions {
        justify-content: space-between;
      }
      .search-box {
        min-width: auto;
      }
      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <i class="fas fa-chart-line"></i>
          <h1>资产管家</h1>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-item" onclick="navigateTo('overview')">
          <i class="fas fa-home"></i>
          <span>资产概览</span>
        </div>
        <div class="nav-item" onclick="navigateTo('customers')">
          <i class="fas fa-users"></i>
          <span>客户管理</span>
        </div>
        <div class="nav-item active" onclick="navigateTo('records')">
          <i class="fas fa-file-invoice"></i>
          <span>资产记录</span>
        </div>
        <div class="nav-item" onclick="navigateTo('analysis')">
          <i class="fas fa-chart-pie"></i>
          <span>数据分析</span>
        </div>
        <div class="nav-item" onclick="navigateTo('export')">
          <i class="fas fa-download"></i>
          <span>报表导出</span>
        </div>
        <div class="sidebar-divider"></div>
        <div class="nav-item" onclick="navigateTo('settings')">
          <i class="fas fa-cog"></i>
          <span>系统设置</span>
        </div>
        <div class="sidebar-divider"></div>
        <div class="nav-item nav-logout" onclick="AuthHelper.logout()" style="color: #f87171;">
          <i class="fas fa-sign-out-alt"></i>
          <span>退出登录</span>
        </div>
      </nav>
    </aside>

    <main class="main-content">
      <header class="header">
        <div class="header-title">
          <h2>资产记录</h2>
          <p>管理客户资产的定期记录与变更</p>
        </div>
        <div class="header-actions">
          <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="搜索客户、资产名称..." id="searchInput" onkeyup="handleSearch()">
          </div>
          <button class="btn btn-primary" onclick="openAddModal()">
            <i class="fas fa-plus"></i>
            <span>新增记录</span>
          </button>
          <div class="header-user">
            <div class="user-avatar">R</div>
          </div>
        </div>
      </header>

      <div class="page-content">
        <div id="recordsPageContent">
          <div class="stats-grid">
          <div class="stats-card">
            <div class="stats-card-header">总资产价值</div>
            <div class="stats-card-value" id="totalAssetsValue">¥ 0</div>
            <div class="stats-card-change" id="totalAssetsChange"><i class="fas fa-arrow-up"></i> 0%</div>
          </div>
          <div class="stats-card">
            <div class="stats-card-header">记录总数</div>
            <div class="stats-card-value" id="totalRecordsCount">0</div>
            <div class="stats-card-change" id="monthlyRecordsChange"><i class="fas fa-arrow-up"></i> 0 条/月</div>
          </div>
          <div class="stats-card">
            <div class="stats-card-header">活跃客户</div>
            <div class="stats-card-value" id="activeCustomersCount">0</div>
            <div class="stats-card-change" id="customersChange"><i class="fas fa-arrow-up"></i> 0%</div>
          </div>
          <div class="stats-card">
            <div class="stats-card-header">本月新增</div>
            <div class="stats-card-value" id="monthlyNewCount">0</div>
            <div class="stats-card-change" id="monthlyNewChange"><i class="fas fa-arrow-up"></i> 0%</div>
          </div>
        </div>

        <div class="tabs">
          <button class="tab active" id="tabRecords" onclick="switchTab('records')">
            <i class="fas fa-list"></i>
            记录列表
          </button>
          <button class="tab" id="tabTimeline" onclick="switchTab('timeline')">
            <i class="fas fa-history"></i>
            变更时间线
          </button>
        </div>

        <div id="recordsContent">
          <div class="filter-bar">
            <div class="filter-group">
              <span class="filter-label">客户:</span>
              <select class="filter-select" id="filterCustomer" onchange="applyFilters()">
                <option value="">全部客户</option>
                <option value="1">张三</option>
                <option value="2">李四</option>
                <option value="3">王五</option>
                <option value="4">赵六</option>
                <option value="5">孙七</option>
              </select>
            </div>
            <div class="filter-group">
              <span class="filter-label">资产类型:</span>
              <select class="filter-select" id="filterType" onchange="applyFilters()">
                <option value="">全部类型</option>
                <option value="stock">股票</option>
                <option value="fund">基金</option>
                <option value="bond">债券</option>
                <option value="realestate">房地产</option>
                <option value="cash">现金</option>
              </select>
            </div>
            <div class="filter-group">
              <span class="filter-label">状态:</span>
              <select class="filter-select" id="filterStatus" onchange="applyFilters()">
                <option value="">全部状态</option>
                <option value="valid">有效</option>
                <option value="invalid">无效</option>
                <option value="pending">待审核</option>
              </select>
            </div>
            <div class="filter-group">
              <span class="filter-label">日期:</span>
              <input type="date" class="filter-date" id="filterStartDate" onchange="applyFilters()">
              <span style="color: var(--color-pageTextSubdued);">至</span>
              <input type="date" class="filter-date" id="filterEndDate" onchange="applyFilters()">
            </div>
            <button class="btn btn-normal btn-sm" onclick="resetFilters()">
              <i class="fas fa-undo"></i>
              重置
            </button>
          </div>

          <div class="asset-records" id="recordsContainer">
            <div class="records-header">
              <div>
                <span class="records-title">资产记录</span>
                <span class="records-count" id="recordCount">共 0 条</span>
              </div>
              <div class="records-actions">
                <button class="btn btn-normal btn-sm" onclick="exportToExcel()">
                  <i class="fas fa-file-excel"></i>
                  Excel导出
                </button>
                <button class="btn btn-normal btn-sm" onclick="document.getElementById('importFileInput').click()">
                  <i class="fas fa-upload"></i>
                  Excel导入
                </button>
                <input type="file" id="importFileInput" accept=".xlsx,.xls,.csv" style="display:none" onchange="importFromExcel(this)">
                <button class="btn btn-normal btn-sm" onclick="exportRecordsCSV()">
                  <i class="fas fa-file-csv"></i>
                  CSV导出
                </button>
              </div>
            </div>
            <div id="recordsList"></div>
          </div>
        </div>

        <div id="timelineContent" style="display: none;">
          <div class="timeline-container" id="timelineContainer"></div>
        </div>
        </div>
        <div id="analysisPageContent" style="display:none;"></div>
        <div id="exportPageContent" style="display:none;"></div>
      </div>
    </main>

    <div class="modal-overlay" id="assetModal">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title" id="modalTitle">新增资产记录</span>
          <button class="modal-close" onclick="closeModal()">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="modal-body">
          <form id="assetForm" novalidate>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label required">客户</label>
                <select class="form-select" id="formCustomer" required>
                  <option value="">请选择客户</option>
                  <option value="1">张三 (ID: C001)</option>
                  <option value="2">李四 (ID: C002)</option>
                  <option value="3">王五 (ID: C003)</option>
                  <option value="4">赵六 (ID: C004)</option>
                  <option value="5">孙七 (ID: C005)</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label required">资产类型</label>
                <select class="form-select" id="formType" required>
                  <option value="">请选择类型</option>
                  <option value="stock">股票</option>
                  <option value="fund">基金</option>
                  <option value="bond">债券</option>
                  <option value="realestate">房地产</option>
                  <option value="cash">现金</option>
                  <option value="other">其他</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label required">资产名称</label>
                <input type="text" class="form-input" id="formName" placeholder="如：招商银行股票" required>
              </div>
              <div class="form-group">
                <label class="form-label required">资产价值 (元)</label>
                <input type="number" class="form-input" id="formValue" placeholder="请输入资产价值" required min="0" step="0.01">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label required">记录日期</label>
                <input type="date" class="form-input" id="formDate" required>
              </div>
              <div class="form-group">
                <label class="form-label">上期价值 (元)</label>
                <input type="number" class="form-input" id="formPreviousValue" placeholder="用于计算变化率" min="0" step="0.01">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">备注说明</label>
              <textarea class="form-textarea" id="formNote" placeholder="可添加备注说明..."></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-normal" onclick="closeModal()">
            <i class="fas fa-times"></i>
            取消
          </button>
          <button class="btn btn-primary" onclick="saveAsset()">
            <i class="fas fa-save"></i>
            保存
          </button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="viewModal">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">记录详情</span>
          <button class="modal-close" onclick="closeViewModal()">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="modal-body">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">客户</label>
              <input type="text" class="form-input" id="viewCustomer" disabled>
            </div>
            <div class="form-group">
              <label class="form-label">资产类型</label>
              <input type="text" class="form-input" id="viewType" disabled>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">资产名称</label>
              <input type="text" class="form-input" id="viewName" disabled>
            </div>
            <div class="form-group">
              <label class="form-label">资产价值</label>
              <input type="text" class="form-input" id="viewValue" disabled>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">记录日期</label>
              <input type="text" class="form-input" id="viewDate" disabled>
            </div>
            <div class="form-group">
              <label class="form-label">变化率</label>
              <input type="text" class="form-input" id="viewChange" disabled>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">状态</label>
              <input type="text" class="form-input" id="viewStatus" disabled>
            </div>
            <div class="form-group">
              <label class="form-label">创建时间</label>
              <input type="text" class="form-input" id="viewCreatedAt" disabled>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">备注说明</label>
            <textarea class="form-textarea" id="viewNote" disabled></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-normal" onclick="closeViewModal()">
            <i class="fas fa-times"></i>
            关闭
          </button>
          <button class="btn btn-primary" onclick="editRecordFromView()">
            <i class="fas fa-edit"></i>
            编辑
          </button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="deleteModal">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">确认删除</span>
          <button class="modal-close" onclick="closeDeleteModal()">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="modal-body">
          <div class="modal-alert warning">
            <i class="fas fa-exclamation-triangle"></i>
            <span>删除后将无法恢复此记录，确定要继续吗？</span>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-normal" onclick="closeDeleteModal()">
            <i class="fas fa-times"></i>
            取消
          </button>
          <button class="btn btn-danger" onclick="deleteRecord()">
            <i class="fas fa-trash"></i>
            确认删除
          </button>
        </div>
      </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

  <script src="js/auth-helper.js"></script>
  <script src="js/common.js"></script>
  <script>
    AuthHelper.checkAuth();

    const CUSTOMERS = {
        1: { id: 1, name: '张三', shortName: '张', code: 'C001' },
        2: { id: 2, name: '李四', shortName: '李', code: 'C002' },
        3: { id: 3, name: '王五', shortName: '王', code: 'C003' },
        4: { id: 4, name: '赵六', shortName: '赵', code: 'C004' },
        5: { id: 5, name: '孙七', shortName: '孙', code: 'C005' }
      };

      const ASSET_TYPES = {
        stock: { value: 'stock', label: '股票' },
        fund: { value: 'fund', label: '基金' },
        bond: { value: 'bond', label: '债券' },
        realestate: { value: 'realestate', label: '房地产' },
        cash: { value: 'cash', label: '现金' },
        other: { value: 'other', label: '其他' }
      };

      const API_BASE = '';

      let currentRecordId = null;
      let isEditMode = false;
      let currentRecords = [];
      let filteredRecords = [];

      function initApp() {
        loadCustomers();
        loadRecords();
        renderTimeline();
      }

      function loadCustomers() {
        AuthHelper.authFetch(API_BASE + '/api/customers')
          .then(function(res) { return res.json(); })
          .then(function(result) {
            if (result.success) {
              CUSTOMERS = {};
              result.data.forEach(function(c) {
                CUSTOMERS[c.id] = c;
              });
              populateCustomerFilters();
            }
            loadRecords();
          })
          .catch(function() {
            loadRecords();
          });
      }

      function populateCustomerFilters() {
        var filterSelect = document.getElementById('filterCustomer');
        if (filterSelect) {
          var currentFilterVal = filterSelect.value;
          filterSelect.innerHTML = '<option value="">全部客户</option>';
          Object.values(CUSTOMERS).forEach(function(c) {
            filterSelect.innerHTML += '<option value="' + c.id + '">' + c.name + '</option>';
          });
          filterSelect.value = currentFilterVal;
        }

        var formSelect = document.getElementById('formCustomer');
        if (formSelect) {
          var currentFormVal = formSelect.value;
          formSelect.innerHTML = '<option value="">请选择客户</option>';
          Object.values(CUSTOMERS).forEach(function(c) {
            formSelect.innerHTML += '<option value="' + c.id + '">' + c.name + ' (ID: ' + (c.code || 'C' + String(c.id).padStart(3, '0')) + ')</option>';
          });
          formSelect.value = currentFormVal;
        }
      }

      function loadRecords() {
        AuthHelper.authFetch(API_BASE + '/api/records')
          .then(function(res) { return res.json(); })
          .then(function(result) {
            if (result.success) {
              currentRecords = result.data;
            } else {
              currentRecords = [];
            }
            filteredRecords = [...currentRecords];
            renderRecords();
            loadStats();
          })
          .catch(function(err) {
            console.error('加载记录失败:', err);
            currentRecords = [];
            filteredRecords = [];
            renderRecords();
            loadStats();
          });
      }

      function loadStats() {
        AuthHelper.authFetch(API_BASE + '/api/stats')
          .then(function(res) { return res.json(); })
          .then(function(result) {
            if (result.success) {
              updateStatsDisplay(result.data);
            }
          })
          .catch(function() {});
      }

      function calculateChangeRate(current, previous) {
        if (!previous || previous <= 0) return '0%';
        const rate = ((current - previous) / previous * 100).toFixed(1);
        return (rate >= 0 ? '+' : '') + rate + '%';
      }

      function isChangePositive(current, previous) {
        if (!previous || previous <= 0) return true;
        return current >= previous;
      }

      function renderRecords() {
        const container = document.getElementById('recordsList');
        const countEl = document.getElementById('recordCount');

        countEl.textContent = `共 ${filteredRecords.length} 条`;

        if (filteredRecords.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-inbox empty-icon"></i>
              <div class="empty-title">暂无记录</div>
              <div class="empty-message">点击右上角"新增记录"按钮添加第一条记录</div>
              <div class="empty-action"><button class="btn btn-primary" onclick="openAddModal()"><i class="fas fa-plus"></i> 新增记录</button></div>
            </div>
          `;
          return;
        }

        container.innerHTML = filteredRecords.map((record, index) => {
          const customer = CUSTOMERS[record.customerId];
          const assetTypeLabel = RickyFinance.getAssetTypeLabel(record.type);
          const changeRate = calculateChangeRate(record.value, record.previousValue);
          const isPositive = isChangePositive(record.value, record.previousValue);

          return `
            <div class="record-row ${index === 0 ? 'highlight' : ''}" data-id="${record.id}">
              <div class="record-cell large">
                <div class="record-customer">
                  <div class="record-avatar">${customer?.shortName || '?'}</div>
                  <div class="record-customer-info">
                    <span class="record-customer-name">${customer?.name || '未知'}</span>
                    <span class="record-customer-id">ID: ${customer?.code || 'N/A'}</span>
                  </div>
                </div>
              </div>
              <div class="record-cell small">
                <span class="record-type ${record.type}">${assetTypeLabel}</span>
              </div>
              <div class="record-cell small right">
                <span class="record-value">${RickyFinance.formatCurrency(record.value)}</span>
              </div>
              <div class="record-cell small right">
                <span class="record-change ${isPositive ? 'positive' : 'negative'}">
                  <i class="fas fa-arrow-${isPositive ? 'up' : 'down'}"></i>
                  ${changeRate}
                </span>
              </div>
              <div class="record-cell small right">
                <span class="record-date">${record.date}</span>
              </div>
              <div class="record-cell small center">
                <span class="record-status ${record.status}">
                  <i class="fas fa-${record.status === 'valid' ? 'check-circle' : record.status === 'pending' ? 'clock' : 'times-circle'}"></i>
                  ${record.status === 'valid' ? '有效' : record.status === 'pending' ? '待审核' : '无效'}
                </span>
              </div>
              <div class="record-cell small record-actions-cell">
                <button class="record-action-btn" onclick="viewRecord('${record.id}')" title="查看详情">
                  <i class="fas fa-eye"></i>
                </button>
                <button class="record-action-btn" onclick="editRecord('${record.id}')" title="编辑记录">
                  <i class="fas fa-edit"></i>
                </button>
                <button class="record-action-btn delete" onclick="confirmDelete('${record.id}')" title="删除记录">
                  <i class="fas fa-trash"></i>
                </button>
              </div>
            </div>
          `;
        }).join('');
      }

      function renderTimeline() {
        const container = document.getElementById('timelineContainer');
        const sorted = [...currentRecords].sort((a, b) => new Date(b.date) - new Date(a.date));

        if (sorted.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-history empty-icon"></i>
              <div class="empty-title">暂无变更记录</div>
              <div class="empty-message">添加资产记录后将在此显示变更时间线</div>
            </div>
          `;
          return;
        }

        container.innerHTML = `
          <div class="timeline-header">
            <span class="timeline-title">最近资产变更</span>
            <span class="timeline-subtitle">显示最近 ${Math.min(sorted.length, 10)} 条记录</span>
          </div>
          <div class="timeline">
            ${sorted.slice(0, 10).map(record => {
              const customer = CUSTOMERS[record.customerId];
              const assetTypeLabel = RickyFinance.getAssetTypeLabel(record.type);
              const changeRate = calculateChangeRate(record.value, record.previousValue);
              const isPositive = isChangePositive(record.value, record.previousValue);

              return `
                <div class="timeline-item ${isPositive ? 'positive' : 'negative'}" onclick="viewRecord('${record.id}')">
                  <div class="timeline-header-row">
                    <div class="timeline-customer">
                      <div class="timeline-avatar">${customer?.shortName || '?'}</div>
                      <div class="timeline-info">
                        <span class="timeline-name">${customer?.name || '未知'}</span>
                        <span class="timeline-type">${assetType?.label || '其他'} - ${record.name}</span>
                      </div>
                    </div>
                    <span class="timeline-date">${record.date}</span>
                  </div>
                  <div class="timeline-body">
                    <span class="timeline-value">${RickyFinance.formatCurrency(record.value)}</span>
                    <span class="timeline-change ${isPositive ? 'positive' : 'negative'}">
                      <i class="fas fa-arrow-${isPositive ? 'up' : 'down'}"></i>
                      ${changeRate}
                    </span>
                  </div>
                  ${record.note ? `<div class="timeline-note"><i class="fas fa-sticky-note"></i> ${record.note}</div>` : ''}
                </div>
              `;
            }).join('')}
          </div>
        `;
      }

      function updateStatsDisplay(stats) {
        if (!stats) return;
        
        document.getElementById('totalAssetsValue').textContent = RickyFinance.formatCurrency(stats.totalValue);
        document.getElementById('totalAssetsChange').innerHTML = `
          <i class="fas fa-arrow-${stats.totalRate >= 0 ? 'up' : 'down'}"></i>
          ${stats.totalRate >= 0 ? '+' : ''}${stats.totalRate}%
        `;
        document.getElementById('totalAssetsChange').className = 'stats-card-change ' + (stats.totalRate >= 0 ? 'positive' : 'negative');
        
        document.getElementById('totalRecordsCount').textContent = stats.totalRecords;
        document.getElementById('monthlyRecordsChange').textContent = stats.monthlyNew + ' 条/月';
        
        document.getElementById('activeCustomersCount').textContent = stats.activeCustomers;
        
        document.getElementById('monthlyNewCount').textContent = stats.monthlyNew;
        document.getElementById('monthlyNewChange').innerHTML = `
          <i class="fas fa-arrow-up"></i>
          +0%
        `;
        document.getElementById('monthlyNewChange').className = 'stats-card-change positive';
      }

      function openAddModal() {
        isEditMode = false;
        currentRecordId = null;
        document.getElementById('modalTitle').textContent = '新增资产记录';
        document.getElementById('assetForm').reset();
        document.getElementById('formDate').valueAsDate = new Date();
        document.getElementById('assetModal').classList.add('active');
      }

      function closeModal() {
        document.getElementById('assetModal').classList.remove('active');
        document.getElementById('assetForm').reset();
      }

      function saveAsset() {
        const form = document.getElementById('assetForm');
        if (!form.checkValidity()) {
          form.reportValidity();
          return;
        }

        const data = {
          customerId: document.getElementById('formCustomer').value,
          type: document.getElementById('formType').value,
          name: document.getElementById('formName').value,
          value: parseFloat(document.getElementById('formValue').value),
          date: document.getElementById('formDate').value,
          previousValue: parseFloat(document.getElementById('formPreviousValue').value) || null,
          note: document.getElementById('formNote').value
        };

        var url = API_BASE + '/api/records';
        var method = 'POST';

        if (isEditMode) {
          url = API_BASE + '/api/records/' + currentRecordId;
          method = 'PUT';
        }

        AuthHelper.authFetch(url, {
          method: method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        })
        .then(function(res) { return res.json(); })
        .then(function(result) {
          if (result.success) {
            RickyFinance.showToast('success', isEditMode ? '记录更新成功！' : '记录新增成功！');
            loadRecords();
            renderTimeline();
            closeModal();
          } else {
            RickyFinance.showToast('error', result.message || '保存失败');
          }
        })
        .catch(function(err) {
          console.error('保存失败:', err);
          RickyFinance.showToast('error', '网络错误，保存失败');
        });
      }

      function viewRecord(id) {
        currentRecordId = id;
        const record = currentRecords.find(r => r.id === id);
        if (!record) return;

        const customer = CUSTOMERS[record.customerId];
        const assetType = ASSET_TYPES[record.type];
        const changeRate = calculateChangeRate(record.value, record.previousValue);

        document.getElementById('viewCustomer').value = customer?.name || '未知';
        document.getElementById('viewType').value = assetType?.label || '其他';
        document.getElementById('viewName').value = record.name;
        document.getElementById('viewValue').value = RickyFinance.formatCurrency(record.value);
        document.getElementById('viewDate').value = record.date;
        document.getElementById('viewChange').value = changeRate;
        document.getElementById('viewStatus').value = record.status === 'valid' ? '有效' : record.status === 'pending' ? '待审核' : '无效';
        document.getElementById('viewCreatedAt').value = record.createdAt || '-';
        document.getElementById('viewNote').value = record.note || '';

        document.getElementById('viewModal').classList.add('active');
      }

      function closeViewModal() {
        document.getElementById('viewModal').classList.remove('active');
      }

      function editRecord(id) {
        currentRecordId = id;
        isEditMode = true;
        const record = currentRecords.find(r => r.id === id);
        if (!record) return;

        document.getElementById('modalTitle').textContent = '编辑资产记录';
        document.getElementById('formCustomer').value = record.customerId;
        document.getElementById('formType').value = record.type;
        document.getElementById('formName').value = record.name;
        document.getElementById('formValue').value = record.value;
        document.getElementById('formDate').value = record.date;
        document.getElementById('formPreviousValue').value = record.previousValue || '';
        document.getElementById('formNote').value = record.note || '';

        document.getElementById('assetModal').classList.add('active');
      }

      function editRecordFromView() {
        closeViewModal();
        editRecord(currentRecordId);
      }

      function confirmDelete(id) {
        currentRecordId = id;
        document.getElementById('deleteModal').classList.add('active');
      }

      function closeDeleteModal() {
        document.getElementById('deleteModal').classList.remove('active');
      }

      function deleteRecord() {
        AuthHelper.authFetch(API_BASE + '/api/records/' + currentRecordId, { method: 'DELETE' })
          .then(function(res) { return res.json(); })
          .then(function(result) {
            if (result.success) {
              loadRecords();
              renderTimeline();
              RickyFinance.showToast('success', '记录删除成功！');
            } else {
              RickyFinance.showToast('error', result.message || '删除失败');
            }
          })
          .catch(function(err) {
            console.error('删除失败:', err);
            RickyFinance.showToast('error', '网络错误，删除失败');
          });
        closeDeleteModal();
      }

      function switchTab(tab) {
        document.getElementById('tabRecords').classList.toggle('active', tab === 'records');
        document.getElementById('tabTimeline').classList.toggle('active', tab === 'timeline');
        document.getElementById('recordsContent').style.display = tab === 'records' ? 'block' : 'none';
        document.getElementById('timelineContent').style.display = tab === 'timeline' ? 'block' : 'none';
      }

      function handleSearch() {
        const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
        
        if (!keyword) {
          filteredRecords = [...currentRecords];
        } else {
          filteredRecords = currentRecords.filter(record => {
            const customer = CUSTOMERS[record.customerId];
            return (
              customer?.name.toLowerCase().includes(keyword) ||
              record.name.toLowerCase().includes(keyword) ||
              customer?.code.toLowerCase().includes(keyword)
            );
          });
        }
        
        renderRecords();
      }

      function applyFilters() {
        const customerId = document.getElementById('filterCustomer').value;
        const type = document.getElementById('filterType').value;
        const status = document.getElementById('filterStatus').value;
        const startDate = document.getElementById('filterStartDate').value;
        const endDate = document.getElementById('filterEndDate').value;

        filteredRecords = currentRecords.filter(record => {
          if (customerId && record.customerId !== customerId) return false;
          if (type && record.type !== type) return false;
          if (status && record.status !== status) return false;
          if (startDate && record.date < startDate) return false;
          if (endDate && record.date > endDate) return false;
          return true;
        });

        renderRecords();
      }

      function resetFilters() {
        document.getElementById('filterCustomer').value = '';
        document.getElementById('filterType').value = '';
        document.getElementById('filterStatus').value = '';
        document.getElementById('filterStartDate').value = '';
        document.getElementById('filterEndDate').value = '';
        document.getElementById('searchInput').value = '';
        applyFilters();
      }

      function exportRecordsCSV() {
        const headers = ['客户', '客户ID', '资产类型', '资产名称', '资产价值', '变化率', '记录日期', '状态', '备注'];
        const rows = currentRecords.map(record => {
          const customer = CUSTOMERS[record.customerId];
          const assetTypeLabel = RickyFinance.getAssetTypeLabel(record.type);
          const changeRate = calculateChangeRate(record.value, record.previousValue);
          return [
            customer?.name || '',
            customer?.code || '',
            assetType?.label || '',
            record.name || '',
            RickyFinance.formatCurrency(record.value),
            changeRate,
            record.date || '',
            record.status === 'valid' ? '有效' : record.status === 'pending' ? '待审核' : '无效',
            record.note || ''
          ];
        });

        const csvContent = [headers.join(','), ...rows.map(row => row.join(','))].join('\n');
        const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', '资产记录_' + new Date().toISOString().split('T')[0] + '.csv');
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        RickyFinance.showToast('success', 'CSV导出成功！');
      }

      function exportToExcel() {
        RickyFinance.showToast('info', '正在生成Excel文件...');
        var records = filteredRecords.length > 0 ? filteredRecords : currentRecords;

        FinanceExcel.exportToExcel(records, CUSTOMERS, { filename: '资产分配记录表' })
          .then(function(result) {
            RickyFinance.showToast('success', 'Excel导出成功！文件：' + result.filename);
          })
          .catch(function(err) {
            console.error('Excel导出失败:', err);
            RickyFinance.showToast('error', 'Excel导出失败，请检查浏览器控制台。正尝试CSV导出...');
            exportRecordsCSV();
          });
      }

      function importFromExcel(input) {
        var file = input.files[0];
        if (!file) return;

        var ext = file.name.split('.').pop().toLowerCase();
        if (ext !== 'xlsx' && ext !== 'xls' && ext !== 'csv') {
          RickyFinance.showToast('error', '仅支持 .xlsx / .xls / .csv 格式文件');
          input.value = '';
          return;
        }

        RickyFinance.showToast('info', '正在解析文件...');

        FinanceExcel.importFromExcel(file, {
          customerMap: CUSTOMERS
        })
          .then(function(result) {
            var count = result.allRecords.length;
            if (count === 0) {
              RickyFinance.showToast('error', '文件中未找到有效数据');
              input.value = '';
              return;
            }

            var imported = 0;
            result.allRecords.forEach(function(r) {
              if (r.value && r.value > 0) {
                var newRecord = {
                  id: Date.now().toString(36) + Math.random().toString(36).substr(2) + '_' + (imported + 1),
                  customerId: String(r.customerId || '1'), // 默认设为第一个客户
                  type: r.type || 'other',
                  name: r.name || '导入资产',
                  value: Number(r.value) || 0,
                  previousValue: r.previousValue || null,
                  date: r.date || new Date().toISOString().split('T')[0],
                  status: r.status || 'valid',
                  note: r.note || '',
                  createdAt: new Date().toLocaleString('zh-CN')
                };
                currentRecords.unshift(newRecord);
                imported++;
              }
            });

            if (imported > 0) {
              saveRecords(); // 保存到 localStorage
              filteredRecords = [...currentRecords];
              renderRecords();
              loadStats();
              renderTimeline();

              // 自动回到记录列表页面
              document.getElementById('recordsContainer').style.display = 'block';
              document.getElementById('timelineContent').style.display = 'none';
              document.getElementById('analysisPageContent').style.display = 'none';
              document.getElementById('exportPageContent').style.display = 'none';
              switchTab('records');
            }

            RickyFinance.showToast('success', '成功导入 ' + imported + ' 条记录（共解析 ' + count + ' 条）');
            input.value = '';
          })
          .catch(function(err) {
            console.error('导入失败:', err);
            RickyFinance.showToast('error', '文件解析失败，请确认文件格式正确');
            input.value = '';
          });
      }

        event.target.closest('.nav-item').classList.add('active');
        
        if (page === 'records') {
          showRecordsPage();
        } else if (page === 'analysis') {
          showAnalysisPage();
        } else if (page === 'overview') {
          RickyFinance.navigateTo('overview');
        } else if (page === 'customers') {
          RickyFinance.navigateTo('customers');
        } else if (page === 'export') {
          showExportPage();
        } else if (page === 'settings') {
          showSettingsPage();
        }
      }

      let dashboardGrid = null;

      let chartIdCounter = 0;

      const DEFAULT_LAYOUT = [
        { id: 'trend', x: 0, y: 0, w: 6, h: 4, type: 'trendChart' },
        { id: 'type', x: 6, y: 0, w: 6, h: 4, type: 'typeChart' },

      function initDashboard() {
        var gridEl = document.getElementById('dashboardGrid');
        if (!gridEl) return;

        if (dashboardGrid) {
          dashboardGrid.destroy(false);
        }
        Object.keys(chartInstances).forEach(function(id) {
          if (chartInstances[id]) {
            chartInstances[id].destroy();
            delete chartInstances[id];
          }
        });

        dashboardGrid = GridStack.init({
          cellHeight: 80,
          margin: 16,
          float: false,
          animate: true,
          column: 12,
          minRow: 1,
          resizable: { handles: 'se, sw, ne, nw, e, s' }
        }, gridEl);

        dashboardGrid.on('resizestop', function(event, el) {
          var nodeId = el.gridstackNode.id;
          if (chartInstances[nodeId]) {
            chartInstances[nodeId].resize();
          }
        });

        dashboardGrid.on('dragstop', function(event, el) {
          var nodeId = el.gridstackNode.id;
          if (chartInstances[nodeId]) {
            chartInstances[nodeId].resize();
          }
        });

        dashboardGrid.on('removed', function(event, items) {
          items.forEach(function(item) {
            if (chartInstances[item.id]) {
              chartInstances[item.id].destroy();
              delete chartInstances[item.id];
            }
          });
        });

        var savedLayout = localStorage.getItem('dashboardLayout');
        var layout = savedLayout ? JSON.parse(savedLayout) : DEFAULT_LAYOUT;

        layout.forEach(function(item) {
          addChartWidget(item.id, item.type, item.x, item.y, item.w, item.h);
        });

        document.addEventListener('click', closeDashboardAddMenu);
      }

      function closeDashboardAddMenu(e) {
        var menu = document.getElementById('addChartMenu');
        if (menu && !e.target.closest('.add-chart-wrapper')) {
          menu.classList.remove('open');
        }
      }

      function addChartWidget(id, type, x, y, w, h) {
        if (!dashboardGrid) return;
        var content = createChartContent(id, type);
        dashboardGrid.addWidget({
          id: id,
          w: w || 6,
          h: h || 4,
          x: x,
          y: y,
          content: '<div class="chart-card">' + content + '</div>'
        });

        setTimeout(function() {
          renderChart(id, type);
        }, 100);
      }
