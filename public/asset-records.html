      function renderChart(id, type) {
        var canvas = document.getElementById('canvas-' + id);
        if (!canvas && type !== 'summaryStats') return;

        switch (type) {
          case 'trendChart': createTrendChart(id, canvas); break;
          case 'typeChart': createTypeChart(id, canvas); break;
          case 'customerChart': createCustomerChart(id, canvas); break;
          case 'changeChart': createChangeChart(id, canvas); break;
          case 'statusPie': createStatusPieChart(id, canvas); break;
          case 'recordTrend': createRecordTrendChart(id, canvas); break;
          case 'customerActivity': createCustomerActivityChart(id, canvas); break;
          case 'summaryStats': createSummaryStats(id); break;
        }
      }

      function createTrendChart(id, canvas) {
        var ctx = canvas.getContext('2d');
        var dates = [];
        var values = [];
        var now = new Date();

        for (var i = 29; i >= 0; i--) {
          var date = new Date(now);
          date.setDate(date.getDate() - i);
          dates.push(date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }));
          var baseValue = currentRecords
            .filter(function(r) { return r.status === 'valid'; })
            .reduce(function(sum, r) { return sum + (r.value || 0); }, 0);
          var variation = (Math.random() - 0.5) * baseValue * 0.1;
          values.push(baseValue + variation);
        }

        chartInstances[id] = new Chart(ctx, {
          type: 'line',
          data: {
            labels: dates,
            datasets: [{
              label: '资产总值',
              data: values,
              borderColor: '#8b5cf6',
              backgroundColor: 'rgba(139, 92, 246, 0.1)',
              borderWidth: 2,
              fill: true,
              tension: 0.4,
              pointRadius: 2,
              pointBackgroundColor: '#8b5cf6'
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: true, position: 'top', labels: { color: '#eaeaea' } },
              tooltip: { mode: 'index', intersect: false, backgroundColor: '#1a1a2e', titleColor: '#eaeaea', bodyColor: '#b8b8d0', borderColor: '#2a2a4a', borderWidth: 1 }
            },
            scales: {
              x: { grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#b8b8d0' } },
              y: { grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#b8b8d0', callback: function(v) { return '¥' + (v / 10000).toFixed(0) + '万'; } } }
            }
          }
        });
      }

      function updateTrendChart() {
        var selectEl = document.activeElement;
        var widgetId = '';
        if (selectEl && selectEl.id && selectEl.id.indexOf('trendTimeRange-') === 0) {
          widgetId = selectEl.id.replace('trendTimeRange-', '');
        } else {
          widgetId = 'trend';
        }

        var timeRange = document.getElementById('trendTimeRange-' + widgetId);
        if (!timeRange) return;
        timeRange = timeRange.value;
        var days = 30;
        switch (timeRange) { case '7d': days = 7; break; case '30d': days = 30; break; case '90d': days = 90; break; case '1y': days = 365; break; }

        var dates = [];
        var values = [];
        var now = new Date();
        for (var i = days - 1; i >= 0; i--) {
          var date = new Date(now);
          date.setDate(date.getDate() - i);
          dates.push(date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }));
          var baseValue = currentRecords.filter(function(r) { return r.status === 'valid'; }).reduce(function(sum, r) { return sum + (r.value || 0); }, 0);
          var variation = (Math.random() - 0.5) * baseValue * 0.1;
          values.push(baseValue + variation);
        }

        if (chartInstances[widgetId]) {
          chartInstances[widgetId].data.labels = dates;
          chartInstances[widgetId].data.datasets[0].data = values;
          chartInstances[widgetId].update();
        }
      }

      function createTypeChart(id, canvas) {
        var ctx = canvas.getContext('2d');
        var typeData = {};
        currentRecords.forEach(function(record) {
          if (record.status === 'valid') {
            if (!typeData[record.type]) typeData[record.type] = 0;
            typeData[record.type] += record.value;
          }
        });

        var labels = Object.keys(typeData).map(function(t) { return RickyFinance.getAssetTypeLabel(t); });
        var data = Object.values(typeData);
        var colors = ['#f59e0b', '#3b82f6', '#10b981', '#ec4899', '#6366f1', '#6b7280'];

        chartInstances[id] = new Chart(ctx, {
          type: 'pie',
          data: { labels: labels, datasets: [{ data: data, backgroundColor: colors, borderColor: '#1a1a2e', borderWidth: 2 }] },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { position: 'right', labels: { color: '#eaeaea', padding: 15 } },
              tooltip: { backgroundColor: '#1a1a2e', titleColor: '#eaeaea', bodyColor: '#b8b8d0', borderColor: '#2a2a4a', borderWidth: 1,
                callbacks: { label: function(ctx) { var v = ctx.raw; var total = ctx.dataset.data.reduce(function(a, b) { return a + b; }, 0); var pct = ((v / total) * 100).toFixed(1); return ctx.label + ': ¥' + (v / 10000).toFixed(0) + '万 (' + pct + '%)'; } } }
            }
          }
        });
      }

      function updateTypeChart(widgetId) {
        var filterEl = document.getElementById('typeFilter-' + widgetId);
        if (!filterEl) return;
        var customerId = filterEl.value;

        var typeData = {};
        currentRecords.forEach(function(record) {
          if (record.status === 'valid' && (customerId === 'all' || record.customerId === customerId)) {
            if (!typeData[record.type]) typeData[record.type] = 0;
            typeData[record.type] += record.value;
          }
        });

        var labels = Object.keys(typeData).map(function(t) { return RickyFinance.getAssetTypeLabel(t); });
        var data = Object.values(typeData);
        var colors = ['#f59e0b', '#3b82f6', '#10b981', '#ec4899', '#6366f1', '#6b7280'];

        if (chartInstances[widgetId]) {
          chartInstances[widgetId].data.labels = labels;
          chartInstances[widgetId].data.datasets[0].data = data;
          chartInstances[widgetId].data.datasets[0].backgroundColor = colors.slice(0, labels.length);
          chartInstances[widgetId].update();
        }
      }

      function createCustomerChart(id, canvas) {
        var ctx = canvas.getContext('2d');
        var customerData = {};
        currentRecords.forEach(function(record) {
          if (record.status === 'valid') {
            if (!customerData[record.customerId]) customerData[record.customerId] = 0;
            customerData[record.customerId] += record.value;
          }
        });

        var labels = Object.keys(customerData).map(function(cid) { return CUSTOMERS[cid]?.name || '客户' + cid; });
        var data = Object.values(customerData);

        chartInstances[id] = new Chart(ctx, {
          type: 'bar',
          data: { labels: labels, datasets: [{ label: '资产总值', data: data, backgroundColor: '#8b5cf6', borderColor: '#7c3aed', borderWidth: 1 }] },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1a1a2e', titleColor: '#eaeaea', bodyColor: '#b8b8d0', borderColor: '#2a2a4a', borderWidth: 1, callbacks: { label: function(ctx) { return '资产总值: ¥' + (ctx.raw / 10000).toFixed(0) + '万'; } } } },
            scales: { x: { grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#b8b8d0' } }, y: { grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#b8b8d0', callback: function(v) { return '¥' + (v / 10000).toFixed(0) + '万'; } } } }
          }
        });
      }

      function createChangeChart(id, canvas) {
        var ctx = canvas.getContext('2d');
        var customerChanges = {};
        currentRecords.forEach(function(record) {
          if (record.status === 'valid' && record.previousValue) {
            if (!customerChanges[record.customerId]) customerChanges[record.customerId] = 0;
            customerChanges[record.customerId] += (record.value - record.previousValue);
          }
        });

        var labels = Object.keys(customerChanges).map(function(cid) { return CUSTOMERS[cid]?.name || '客户' + cid; });
        var data = Object.values(customerChanges);

        chartInstances[id] = new Chart(ctx, {
          type: 'bar',
          data: { labels: labels, datasets: [{ label: '资产变化', data: data, backgroundColor: data.map(function(v) { return v >= 0 ? '#4ade80' : '#f87171'; }), borderColor: data.map(function(v) { return v >= 0 ? '#22c55e' : '#ef4444'; }), borderWidth: 1 }] },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1a1a2e', titleColor: '#eaeaea', bodyColor: '#b8b8d0', borderColor: '#2a2a4a', borderWidth: 1, callbacks: { label: function(ctx) { return '资产变化: ¥' + ctx.raw.toLocaleString('zh-CN'); } } } },
            scales: { x: { grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#b8b8d0' } }, y: { grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#b8b8d0', callback: function(v) { return '¥' + v.toLocaleString('zh-CN'); } } } }
          }
        });
      }

      function createStatusPieChart(id, canvas) {
        var ctx = canvas.getContext('2d');
        var statusData = {};
        currentRecords.forEach(function(record) {
          var statusLabel = record.status === 'valid' ? '有效资产' : record.status === 'pending' ? '待审核' : '其他';
          if (!statusData[statusLabel]) statusData[statusLabel] = 0;
          statusData[statusLabel] += (record.value || 0);
        });

        var labels = Object.keys(statusData);
        var data = Object.values(statusData);
        var colors = ['#4ade80', '#f59e0b', '#6b7280'];

        chartInstances[id] = new Chart(ctx, {
          type: 'doughnut',
          data: { labels: labels, datasets: [{ data: data, backgroundColor: colors.slice(0, labels.length), borderColor: '#1a1a2e', borderWidth: 2 }] },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { position: 'right', labels: { color: '#eaeaea', padding: 15 } },
              tooltip: { backgroundColor: '#1a1a2e', titleColor: '#eaeaea', bodyColor: '#b8b8d0', borderColor: '#2a2a4a', borderWidth: 1,
                callbacks: { label: function(ctx) { var v = ctx.raw; var total = ctx.dataset.data.reduce(function(a, b) { return a + b; }, 0); var pct = ((v / total) * 100).toFixed(1); return ctx.label + ': ¥' + (v / 10000).toFixed(0) + '万 (' + pct + '%)'; } } }
            }
          }
        });
      }

      function createRecordTrendChart(id, canvas) {
        var ctx = canvas.getContext('2d');
        var dates = [];
        var counts = [];
        var now = new Date();

        for (var i = 29; i >= 0; i--) {
          var date = new Date(now);
          date.setDate(date.getDate() - i);
          dates.push(date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }));
          var dayCount = currentRecords.filter(function(r) {
            var rd = new Date(r.date);
            return rd.toDateString() === date.toDateString();
          }).length;
          counts.push(dayCount + Math.floor(Math.random() * 3));
        }

        chartInstances[id] = new Chart(ctx, {
          type: 'line',
          data: { labels: dates, datasets: [{ label: '记录变更数', data: counts, borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)', borderWidth: 2, fill: true, tension: 0.4, pointRadius: 2, pointBackgroundColor: '#10b981' }] },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: true, position: 'top', labels: { color: '#eaeaea' } }, tooltip: { mode: 'index', intersect: false, backgroundColor: '#1a1a2e', titleColor: '#eaeaea', bodyColor: '#b8b8d0', borderColor: '#2a2a4a', borderWidth: 1 } },
            scales: { x: { grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#b8b8d0' } }, y: { grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#b8b8d0', stepSize: 1 } } }
          }
        });
      }

      function createCustomerActivityChart(id, canvas) {
        var ctx = canvas.getContext('2d');
        var activityData = {};
        currentRecords.forEach(function(record) {
          if (!activityData[record.customerId]) activityData[record.customerId] = 0;
          activityData[record.customerId] += 1;
        });

        var labels = Object.keys(activityData).map(function(cid) { return CUSTOMERS[cid]?.name || '客户' + cid; });
        var data = Object.values(activityData);

        chartInstances[id] = new Chart(ctx, {
          type: 'bar',
          data: { labels: labels, datasets: [{ label: '记录数量', data: data, backgroundColor: '#6366f1', borderColor: '#4f46e5', borderWidth: 1 }] },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1a1a2e', titleColor: '#eaeaea', bodyColor: '#b8b8d0', borderColor: '#2a2a4a', borderWidth: 1, callbacks: { label: function(ctx) { return '记录数量: ' + ctx.raw + ' 条'; } } } },
            scales: { x: { grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#b8b8d0' } }, y: { grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#b8b8d0', stepSize: 1 } } }
          }
        });
      }

      function createSummaryStats(id) {
        var container = document.getElementById('statsContainer-' + id);
        if (!container) return;
        var validRecords = currentRecords.filter(function(r) { return r.status === 'valid'; });
        var totalValue = validRecords.reduce(function(sum, r) { return sum + (r.value || 0); }, 0);
        var totalCount = currentRecords.length;
        var validCount = validRecords.length;
        var customerSet = {};
        currentRecords.forEach(function(r) { customerSet[r.customerId] = true; });
        var customerCount = Object.keys(customerSet).length;

        container.innerHTML = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;height:100%;">
          <div style="background:rgba(139,92,246,0.1);border-radius:8px;padding:16px;display:flex;flex-direction:column;justify-content:center;align-items:center;">
            <div style="font-size:12px;color:#b8b8d0;margin-bottom:6px;">资产总值</div>
            <div style="font-size:22px;font-weight:700;color:#a78bfa;">¥${(totalValue / 10000).toFixed(0)}<span style="font-size:13px;font-weight:400;">万</span></div>
          </div>
          <div style="background:rgba(16,185,129,0.1);border-radius:8px;padding:16px;display:flex;flex-direction:column;justify-content:center;align-items:center;">
            <div style="font-size:12px;color:#b8b8d0;margin-bottom:6px;">有效记录</div>
            <div style="font-size:22px;font-weight:700;color:#4ade80;">${validCount}<span style="font-size:13px;font-weight:400;"> / ${totalCount}</span></div>
          </div>
          <div style="background:rgba(245,158,11,0.1);border-radius:8px;padding:16px;display:flex;flex-direction:column;justify-content:center;align-items:center;">
            <div style="font-size:12px;color:#b8b8d0;margin-bottom:6px;">活跃客户</div>
            <div style="font-size:22px;font-weight:700;color:#f59e0b;">${customerCount}<span style="font-size:13px;font-weight:400;"> 位</span></div>
          </div>
          <div style="background:rgba(99,102,241,0.1);border-radius:8px;padding:16px;display:flex;flex-direction:column;justify-content:center;align-items:center;">
            <div style="font-size:12px;color:#b8b8d0;margin-bottom:6px;">数据更新</div>
            <div style="font-size:14px;font-weight:600;color:#6366f1;">${new Date().toLocaleDateString('zh-CN')}</div>
          </div>
        </div>`;
        chartInstances[id] = { resize: function() {} };
      }

      function toggleAddChartMenu(event) {
        event.stopPropagation();
        var menu = document.getElementById('addChartMenu');
        if (menu) menu.classList.toggle('open');
      }

      function addChartByType(type) {
        var menu = document.getElementById('addChartMenu');
        if (menu) menu.classList.remove('open');
        chartIdCounter++;
        var newId = type + '-' + Date.now();
        var nodes = dashboardGrid.engine.nodes;
        var maxY = 0;
        nodes.forEach(function(n) { if (n.y + n.h > maxY) maxY = n.y + n.h; });
        addChartWidget(newId, type, 0, maxY, 6, 4);
        RickyFinance.showToast('success', '图表已添加，可自由拖拽调整位置');
      }

      function deleteChart(id) {
        if (!dashboardGrid) return;
        var node = dashboardGrid.engine.nodes.find(function(n) { return n.id === id; });
        if (!node) return;
        if (chartInstances[id]) {
          chartInstances[id].destroy();
          delete chartInstances[id];
        }
        dashboardGrid.removeWidget(node.el);
        RickyFinance.showToast('info', '图表已删除');
      }

      function saveDashboardLayout() {
        if (!dashboardGrid) return;
        var layout = dashboardGrid.engine.nodes.map(function(n) {
          var chartType = '';
          if (n.id.indexOf('trendChart-') >= 0) chartType = 'trendChart';
          else if (n.id.indexOf('typeChart-') >= 0) chartType = 'typeChart';
          else if (n.id.indexOf('customerChart-') >= 0) chartType = 'customerChart';
          else if (n.id.indexOf('changeChart-') >= 0) chartType = 'changeChart';
          else if (n.id.indexOf('statusPie-') >= 0) chartType = 'statusPie';
          else if (n.id.indexOf('recordTrend-') >= 0) chartType = 'recordTrend';
          else if (n.id.indexOf('customerActivity-') >= 0) chartType = 'customerActivity';
          else if (n.id.indexOf('summaryStats-') >= 0) chartType = 'summaryStats';
          else {
            if (n.id === 'trend') chartType = 'trendChart';
            else if (n.id === 'type') chartType = 'typeChart';
            else if (n.id === 'customer') chartType = 'customerChart';
            else if (n.id === 'change') chartType = 'changeChart';
          }
          return { id: n.id, x: n.x, y: n.y, w: n.w, h: n.h, type: chartType };
        });
        localStorage.setItem('dashboardLayout', JSON.stringify(layout));
        RickyFinance.showToast('success', '仪表盘布局已保存');
      }

      function resetDashboardLayout() {
        localStorage.removeItem('dashboardLayout');
        Object.keys(chartInstances).forEach(function(id) {
          if (chartInstances[id]) {
            chartInstances[id].destroy();
            delete chartInstances[id];
          }
        });
        if (dashboardGrid) {
          dashboardGrid.removeAll();
          DEFAULT_LAYOUT.forEach(function(item) {
            addChartWidget(item.id, item.type, item.x, item.y, item.w, item.h);
          });
        }
        RickyFinance.showToast('success', '布局已重置为默认');
      }

      document.addEventListener('DOMContentLoaded', initApp);
    </script>
  </body>
</html>
