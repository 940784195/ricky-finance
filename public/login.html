<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 资产管家</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/common.css">
</head>
<body class="auth-page">
  <div class="bg-decoration bg-decoration-1"></div>
  <div class="bg-decoration bg-decoration-2"></div>

  <div class="login-container">
    <div class="login-header">
      <div class="login-logo">
        <i class="fa-solid fa-chart-pie"></i>
      </div>
      <h1 class="login-title">资产管家</h1>
      <p class="login-subtitle">客户资产管理系统</p>
    </div>

    <div class="login-card">
      <div class="tab-switch">
        <button class="tab-btn active" onclick="switchTab('login')">账号登录</button>
        <button class="tab-btn" onclick="switchTab('register')">用户注册</button>
      </div>

      <!-- 登录表单 -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">用户名</label>
          <input
            type="text"
            class="form-input"
            id="loginUsername"
            placeholder="请输入用户名"
            autocomplete="username"
          />
          <div class="form-error" id="loginUsernameError"></div>
        </div>

        <div class="form-group">
          <label class="form-label">密码</label>
          <div class="password-field">
            <input
              type="password"
              class="form-input"
              id="loginPassword"
              placeholder="请输入密码"
              autocomplete="current-password"
            />
            <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">
              <i class="fa-solid fa-eye-slash"></i>
            </button>
          </div>
          <div class="form-error" id="loginPasswordError"></div>
        </div>

        <button type="submit" class="submit-btn" id="loginSubmitBtn">
          <span id="loginBtnText">登 录</span>
          <span id="loginBtnSpinner" class="spinner hidden"></span>
        </button>
      </form>

      <!-- 注册表单 -->
      <form id="registerForm" class="hidden" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label class="form-label">用户名</label>
          <input
            type="text"
            class="form-input"
            id="registerUsername"
            placeholder="请输入用户名"
            autocomplete="username"
          />
          <div class="form-error" id="registerUsernameError"></div>
        </div>

        <div class="form-group">
          <label class="form-label">姓名（选填）</label>
          <input
            type="text"
            class="form-input"
            id="registerCustomerName"
            placeholder="请输入您的姓名"
          />
        </div>

        <div class="form-group">
          <label class="form-label">密码</label>
          <div class="password-field">
            <input
              type="password"
              class="form-input"
              id="registerPassword"
              placeholder="请输入密码（至少6位）"
              autocomplete="new-password"
            />
            <button type="button" class="password-toggle" onclick="togglePassword('registerPassword', this)">
              <i class="fa-solid fa-eye-slash"></i>
            </button>
          </div>
          <div class="form-error" id="registerPasswordError"></div>
        </div>

        <div class="form-group">
          <label class="form-label">确认密码</label>
          <div class="password-field">
            <input
              type="password"
              class="form-input"
              id="registerConfirmPassword"
              placeholder="请再次输入密码"
              autocomplete="new-password"
            />
            <button type="button" class="password-toggle" onclick="togglePassword('registerConfirmPassword', this)">
              <i class="fa-solid fa-eye-slash"></i>
            </button>
          </div>
          <div class="form-error" id="registerConfirmPasswordError"></div>
        </div>

        <button type="submit" class="submit-btn" id="registerSubmitBtn">
          <span id="registerBtnText">注 册</span>
          <span id="registerBtnSpinner" class="spinner hidden"></span>
        </button>
      </form>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script>
    var API_BASE = window.location.origin;
    var currentTab = 'login';

    function switchTab(tab) {
      currentTab = tab;
      var tabs = document.querySelectorAll('.tab-btn');
      tabs.forEach(function(t) { t.classList.remove('active'); });

      if (tab === 'login') {
        tabs[0].classList.add('active');
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('registerForm').classList.add('hidden');
      } else {
        tabs[1].classList.add('active');
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('registerForm').classList.remove('hidden');
      }

      clearErrors();
    }

    function clearErrors() {
      var errors = document.querySelectorAll('.form-error');
      errors.forEach(function(e) { e.classList.remove('visible'); e.textContent = ''; });
      var inputs = document.querySelectorAll('.form-input');
      inputs.forEach(function(i) { i.classList.remove('error'); });
    }

    function showFieldError(fieldId, message) {
      var field = document.getElementById(fieldId);
      var error = document.getElementById(fieldId + 'Error');
      if (field) field.classList.add('error');
      if (error) { error.textContent = message; error.classList.add('visible'); }
    }

    function setLoading(formType, loading) {
      var btn = document.getElementById(formType + 'SubmitBtn');
      var text = document.getElementById(formType + 'BtnText');
      var spinner = document.getElementById(formType + 'BtnSpinner');

      if (loading) {
        btn.disabled = true;
        text.classList.add('hidden');
        spinner.classList.remove('hidden');
      } else {
        btn.disabled = false;
        text.classList.remove('hidden');
        spinner.classList.add('hidden');
      }
    }

    function togglePassword(inputId, btn) {
      var input = document.getElementById(inputId);
      var icon = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      } else {
        input.type = 'password';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      }
    }

    function handleLogin(e) {
      e.preventDefault();
      clearErrors();

      var username = document.getElementById('loginUsername').value.trim();
      var password = document.getElementById('loginPassword').value;

      var hasError = false;

      if (!username) {
        showFieldError('loginUsername', '请输入用户名');
        hasError = true;
      }

      if (!password) {
        showFieldError('loginPassword', '请输入密码');
        hasError = true;
      }

      if (hasError) return;

      setLoading('login', true);

      fetch(API_BASE + '/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, password: password })
      })
        .then(function(res) { return res.json(); })
        .then(function(data) {
          setLoading('login', false);

          if (data.success) {
            RickyFinance.saveAuth(data.data.token, data.data.user);
            RickyFinance.showAuthToast('登录成功，正在跳转...', 'success');
            setTimeout(RickyFinance.redirectToApp, 800);
          } else {
            RickyFinance.showAuthToast(data.message || '登录失败', 'error');
          }
        })
        .catch(function(err) {
          setLoading('login', false);
          RickyFinance.showAuthToast('网络错误，请稍后重试', 'error');
        });
    }

    function handleRegister(e) {
      e.preventDefault();
      clearErrors();

      var username = document.getElementById('registerUsername').value.trim();
      var customerName = document.getElementById('registerCustomerName').value.trim();
      var password = document.getElementById('registerPassword').value;
      var confirmPassword = document.getElementById('registerConfirmPassword').value;

      var hasError = false;

      if (!username) {
        showFieldError('registerUsername', '请输入用户名');
        hasError = true;
      } else if (username.length < 3) {
        showFieldError('registerUsername', '用户名至少需要3个字符');
        hasError = true;
      }

      if (!password) {
        showFieldError('registerPassword', '请输入密码');
        hasError = true;
      } else if (password.length < 6) {
        showFieldError('registerPassword', '密码长度不能少于6位');
        hasError = true;
      }

      if (!confirmPassword) {
        showFieldError('registerConfirmPassword', '请确认密码');
        hasError = true;
      } else if (password !== confirmPassword) {
        showFieldError('registerConfirmPassword', '两次输入的密码不一致');
        hasError = true;
      }

      if (hasError) return;

      setLoading('register', true);

      fetch(API_BASE + '/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: username,
          password: password,
          confirmPassword: confirmPassword,
          customerName: customerName || undefined
        })
      })
        .then(function(res) { return res.json(); })
        .then(function(data) {
          setLoading('register', false);

          if (data.success) {
            RickyFinance.saveAuth(data.data.token, data.data.user);
            RickyFinance.showAuthToast('注册成功，正在跳转...', 'success');
            setTimeout(RickyFinance.redirectToApp, 800);
          } else {
            RickyFinance.showAuthToast(data.message || '注册失败', 'error');
          }
        })
        .catch(function(err) {
          setLoading('register', false);
          RickyFinance.showAuthToast('网络错误，请稍后重试', 'error');
        });
    }

    (function checkExistingAuth() {
      var auth = RickyFinance.getAuth();
      if (auth.token) {
        fetch(API_BASE + '/api/auth/me', {
          headers: { 'Authorization': 'Bearer ' + auth.token }
        })
          .then(function(res) { return res.json(); })
          .then(function(data) {
            if (data.success) {
              RickyFinance.redirectToApp();
            } else {
              RickyFinance.clearAuth();
            }
          })
          .catch(function() {});
      }
    })();
  </script>
</body>
</html>
