<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资产管家 - 资产概览</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        .charts-container {
            margin-bottom: 24px;
        }
        .chart-card {
            height: 100%;
            min-height: 320px;
        }
        .chart-wrapper {
            position: relative;
            height: 280px;
            padding: 12px 0;
        }
        .no-data {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .section-header h3 {
            font-size: 18px;
            font-weight: 600;
        }
        .records-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .record-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: var(--bg-hover);
            border-radius: 10px;
            transition: transform 0.2s;
        }
        .record-item:hover {
            transform: translateY(-2px);
        }
        .record-main {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .record-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .record-info h4 {
            font-size: 14px;
            font-weight: 600;
        }
        .record-info p {
            font-size: 13px;
            color: var(--text-muted);
        }
        .record-value {
            font-size: 16px;
            font-weight: 700;
        }
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .quick-btn {
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-btn:hover {
            background: var(--accent);
            color: white;
        }
        .quick-btn .icon {
            font-size: 24px;
            margin-bottom: 6px;
        }
        .quick-btn span {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .quick-btn:hover span {
            color: white;
        }
        .time-filter {
            display: flex;
            gap: 8px;
        }
        .time-filter-btn {
            padding: 6px 12px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .time-filter-btn:hover {
            background: var(--bg-hover);
        }
        .time-filter-btn.active {
            background: var(--accent);
            color: white;
        }
    </style>
</head>
<body>
<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>🏠 资产管家</h1>
            <p>家庭资产管理平台</p>
        </div>

        <nav class="nav" id="nav">
            <a href="/dashboard.html" class="nav-item active" data-page="dashboard">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                    <polyline points="9,22 9,12 15,12 15,22"/>
                </svg>
                资产概览
            </a>
            <a href="/records.html" class="nav-item" data-page="records">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                    <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                资产记录
            </a>
            <a href="/members.html" class="nav-item" data-page="members" id="nav-members">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 00-3-3.87"/>
                    <path d="M16 3.13a4 4 0 010 7.75"/>
                </svg>
                家庭成员
            </a>
            <a href="/asset-types.html" class="nav-item" data-page="asset-types" id="nav-asset-types">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                </svg>
                资产类型
            </a>
            <a href="/admin-families.html" class="nav-item" data-page="admin-families" id="nav-admin-families" style="display: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <line x1="3" y1="9" x2="21" y2="9"/>
                    <line x1="9" y1="21" x2="9" y2="9"/>
                </svg>
                所有家庭
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="nav-item" id="logoutBtn" style="color: var(--danger);">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                    <polyline points="16,17 21,12 16,7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                退出登录
            </div>
        </div>
    </aside>

    <main class="main">
        <header class="header">
            <div class="header-title">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <button class="mobile-menu-btn" id="menuBtn">☰</button>
                    <div>
                        <h2>资产概览</h2>
                        <p>资产概览与数据分析</p>
                    </div>
                </div>
            </div>
            <div class="header-actions">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">?</div>
                    <div>
                        <div style="font-size: 14px; font-weight: 600;" id="userName">用户</div>
                        <div style="font-size: 12px; color: var(--text-muted);" id="userRole">角色</div>
                    </div>
                </div>
            </div>
        </header>

        <section class="content">
            <div class="stats-grid" id="statsGrid">
            </div>

            <div class="two-col charts-container">
                <div class="card chart-card">
                    <div class="section-header">
                        <h3>资产趋势</h3>
                        <div class="time-filter">
                            <button class="time-filter-btn active" data-period="1month">近1月</button>
                            <button class="time-filter-btn" data-period="3months">近3月</button>
                            <button class="time-filter-btn" data-period="6months">近6月</button>
                            <button class="time-filter-btn" data-period="1year">近1年</button>
                        </div>
                    </div>
                    <div class="chart-wrapper">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>

                <div class="card chart-card">
                    <div class="section-header">
                        <h3>资产配置</h3>
                    </div>
                    <div class="chart-wrapper">
                        <canvas id="distributionChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="two-col charts-container">
                <div class="card chart-card">
                    <div class="section-header">
                        <h3>快速操作</h3>
                    </div>
                    <div class="quick-actions" id="quickActions">
                        <button class="card quick-btn" id="addRecordBtn">
                            <div class="icon">➕</div>
                            <span>添加记录</span>
                        </button>
                        <button class="card quick-btn" id="exportBtn">
                            <div class="icon">📊</div>
                            <span>导出数据</span>
                        </button>
                        <button class="card quick-btn" id="viewRecordsBtn">
                            <div class="icon">📋</div>
                            <span>查看记录</span>
                        </button>
                    </div>
                </div>

                <div class="card chart-card">
                    <div class="section-header">
                        <h3>成员资产</h3>
                    </div>
                    <div class="chart-wrapper">
                        <canvas id="memberChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="two-col">
                <div class="card">
                    <div class="section-header">
                        <h3>最近记录</h3>
                        <a href="/records.html" style="font-size: 13px; color: var(--accent); text-decoration: none;">查看全部 →</a>
                    </div>
                    <div class="records-list" id="recentRecords">
                        <div class="no-data">暂无记录</div>
                    </div>
                </div>

                <div class="card" id="familyMembersCard">
                    <div class="section-header">
                        <h3>家庭成员</h3>
                        <a href="/members.html" id="viewMembersLink" style="font-size: 13px; color: var(--accent); text-decoration: none;">查看全部 →</a>
                    </div>
                    <div id="familyMembers">
                        <div class="no-data">暂无成员</div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</div>

<div class="modal-overlay" id="addRecordModal">
    <div class="modal">
        <div class="modal-header">
            <h3>添加资产记录</h3>
            <button class="modal-close" id="closeRecordModal">×</button>
        </div>
        <div class="modal-body">
            <form id="recordForm">
                <div class="form-group" id="recordMemberGroup">
                    <label>成员</label>
                    <select id="recordMemberId" class="form-control" required>
                    </select>
                </div>
                <div class="form-group">
                    <label>资产类型</label>
                    <select id="recordType" class="form-control" required>
                    </select>
                </div>
                <div class="form-group">
                    <label>资产名称</label>
                    <input type="text" id="recordName" class="form-control" required placeholder="例如：招商银行股票">
                </div>
                <div class="form-group">
                    <label>当前价值</label>
                    <input type="number" id="recordValue" class="form-control" required step="0.01" placeholder="0">
                </div>
                <div class="form-group">
                    <label>日期</label>
                    <input type="date" id="recordDate" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>备注（可选）</label>
                    <textarea id="recordNote" class="form-control" rows="3" placeholder="记录备注"></textarea>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" id="cancelRecordBtn">取消</button>
            <button type="submit" class="btn btn-primary" form="recordForm">保存</button>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script>
(function() {
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/login.html';
        return;
    }

    const user = API.getCurrentUser();
    const isAdmin = user?.role === 'admin';
    const isHead = user?.role === 'head';

    let members = [];
    let assetTypes = [];
    let allRecords = [];
    let trendChart = null;
    let distributionChart = null;
    let memberChart = null;
    let currentPeriod = '1month';

    const sidebar = document.getElementById('sidebar');
    const menuBtn = document.getElementById('menuBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const userAvatar = document.getElementById('userAvatar');
    const userName = document.getElementById('userName');
    const userRole = document.getElementById('userRole');
    const statsGrid = document.getElementById('statsGrid');
    const recentRecords = document.getElementById('recentRecords');
    const familyMembers = document.getElementById('familyMembers');
    const addRecordBtn = document.getElementById('addRecordBtn');
    const exportBtn = document.getElementById('exportBtn');
    const viewRecordsBtn = document.getElementById('viewRecordsBtn');
    const addRecordModal = document.getElementById('addRecordModal');
    const closeRecordModal = document.getElementById('closeRecordModal');
    const cancelRecordBtn = document.getElementById('cancelRecordBtn');
    const recordForm = document.getElementById('recordForm');

    const navMembers = document.getElementById('nav-members');
    const navAssetTypes = document.getElementById('nav-asset-types');
    const navAdminFamilies = document.getElementById('nav-admin-families');
    const familyMembersCard = document.getElementById('familyMembersCard');
    const viewMembersLink = document.getElementById('viewMembersLink');
    const recordMemberGroup = document.getElementById('recordMemberGroup');

    init();

    async function init() {
        setupUserInfo();
        setupNav();
        setupEventListeners();
        setTodayDate();
        await loadAllData();
    }

    function setupUserInfo() {
        userName.textContent = user?.name || user?.username || '用户';
        userRole.textContent = Utils.getRoleLabel(user?.role);
        userAvatar.textContent = Utils.getShortName(user?.name || user?.username);
    }

    function setupNav() {
        if (isAdmin) {
            navMembers.style.display = 'none';
            navAssetTypes.style.display = 'none';
            familyMembersCard.style.display = 'none';
            navAdminFamilies.style.display = 'flex';
        } else {
            navAdminFamilies.style.display = 'none';
            if (user?.role === 'member') {
                navMembers.style.display = 'none';
                navAssetTypes.style.display = 'none';
                viewMembersLink.style.display = 'none';
            }
        }
    }

    function setupEventListeners() {
        menuBtn.addEventListener('click', () => sidebar.classList.toggle('open'));

        logoutBtn.addEventListener('click', () => {
            if (confirm('确定要退出登录吗？')) {
                API.logout();
            }
        });

        addRecordBtn.addEventListener('click', openRecordModal);
        closeRecordModal.addEventListener('click', closeModal);
        cancelRecordBtn.addEventListener('click', closeModal);
        addRecordModal.addEventListener('click', e => {
            if (e.target === addRecordModal) closeModal();
        });

        recordForm.addEventListener('submit', handleRecordSubmit);

        exportBtn.addEventListener('click', () => API.exportCSV());
        viewRecordsBtn.addEventListener('click', () => window.location.href = '/records.html');

        document.querySelectorAll('.time-filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.time-filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentPeriod = btn.dataset.period;
                updateTrendChart();
            });
        });
    }

    function setTodayDate() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('recordDate').value = today;
    }

    async function loadAllData() {
        await Promise.all([
            loadStats(),
            loadMembers(),
            loadAssetTypes(),
            loadRecentRecords()
        ]);
        initCharts();
    }

    async function loadStats() {
        try {
            const res = await API.getStats();
            if (res.success) {
                renderStats(res.data);
            }
        } catch (e) {
            console.error('Failed to load stats:', e);
        }
    }

    function renderStats(stats) {
        statsGrid.innerHTML = `
            <div class="card stat-card" style="background: linear-gradient(135deg, var(--accent), #7c3aed);">
                <div class="stat-label">总资产</div>
                <div class="stat-value">${Utils.formatMoney(stats.totalValue)}</div>
            </div>
            <div class="card stat-card">
                <div class="stat-label">资产记录</div>
                <div class="stat-value">${stats.totalRecords}</div>
            </div>
            <div class="card stat-card">
                <div class="stat-label">${isAdmin ? '家庭总数' : '成员数'}</div>
                <div class="stat-value">${stats.memberCount}</div>
                <div class="stat-change">
                    ${isAdmin ? '' : `${stats.activeMembers}个活跃`}
                </div>
            </div>
            <div class="card stat-card">
                <div class="stat-label">本月新增</div>
                <div class="stat-value">${stats.monthlyNew}</div>
            </div>
        `;

        if (distributionChart) {
            updateDistributionChart(stats.typeDistribution || []);
        }
    }

    async function loadMembers() {
        try {
            const res = await API.getMembers();
            if (res.success) {
                members = res.data;
                renderFamilyMembers();
                populateMemberSelect();
            }
        } catch (e) {
            console.error('Failed to load members:', e);
        }
    }

    function renderFamilyMembers() {
        if (!members.length) {
            familyMembers.innerHTML = '<div class="no-data">暂无成员</div>';
            return;
        }

        const html = members.slice(0, 5).map(m => `
            <div style="display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border);">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div style="width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #8b5cf6, #7c3aed); display: flex; align-items: center; justify-content: center; font-weight: 700;">
                        ${Utils.getShortName(m.name)}
                    </div>
                    <div>
                        <div style="font-weight: 600;">${m.name}</div>
                        <div style="font-size: 12px; color: var(--text-muted);">${Utils.getRoleLabel(m.role)}</div>
                    </div>
                </div>
                <div style="text-align: right;">
                    <div style="font-weight: 700;">${Utils.formatMoney(m.total_value || 0)}</div>
                    <div style="font-size: 12px; color: var(--text-muted);">${m.record_count || 0}条记录</div>
                </div>
            </div>
        `).join('');

        familyMembers.innerHTML = html;

        if (memberChart) {
            updateMemberChart();
        }
    }

    function populateMemberSelect() {
        const select = document.getElementById('recordMemberId');
        if (!select) return;

        if (!isHead && user?.memberId) {
            recordMemberGroup.style.display = 'none';
            return;
        }

        recordMemberGroup.style.display = '';
        select.innerHTML = members.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
    }

    async function loadAssetTypes() {
        try {
            const res = await API.getAssetTypes();
            if (res.success) {
                assetTypes = res.data;
                populateTypeSelect();
            }
        } catch (e) {
            console.error('Failed to load asset types:', e);
        }
    }

    function populateTypeSelect() {
        const select = document.getElementById('recordType');
        if (!select) return;

        select.innerHTML = assetTypes.map(t => `<option value="${t.type_value}">${t.display_name}</option>`).join('');
    }

    async function loadRecentRecords() {
        try {
            const res = await API.getRecords();
            if (res.success) {
                allRecords = res.data;
                renderRecords(res.data);
            }
        } catch (e) {
            console.error('Failed to load records:', e);
        }
    }

    function renderRecords(records) {
        if (!records.length) {
            recentRecords.innerHTML = '<div class="no-data">暂无记录</div>';
            return;
        }

        const typeColors = {};
        assetTypes.forEach(t => typeColors[t.type_value] = t.color);

        const html = records.slice(0, 8).map(r => {
            const type = assetTypes.find(t => t.type_value === r.type);
            const color = type?.color || '#8b5cf6';
            const change = r.previous_value != null ? r.value - r.previous_value : null;

            return `
                <div class="record-item">
                    <div class="record-main">
                        <div class="record-dot" style="background: ${color};"></div>
                        <div class="record-info">
                            <h4>${r.name}</h4>
                            <p>${r.member_name || ''} • ${Utils.formatDate(r.date)}</p>
                        </div>
                    </div>
                    <div style="text-align: right;">
                        <div class="record-value">${Utils.formatMoney(r.value)}</div>
                        ${change != null ? `<div style="font-size: 12px; color: ${change >= 0 ? 'var(--success)' : 'var(--danger)'};">
                            ${change >= 0 ? '↑' : '↓'} ${Utils.formatMoney(Math.abs(change))}
                        </div>` : ''}
                    </div>
                </div>
            `;
        }).join('');

        recentRecords.innerHTML = html;
    }

    function initCharts() {
        initTrendChart();
        initDistributionChart();
        initMemberChart();
    }

    function initTrendChart() {
        const ctx = document.getElementById('trendChart').getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 300);
        gradient.addColorStop(0, 'rgba(139, 92, 246, 0.3)');
        gradient.addColorStop(1, 'rgba(139, 92, 246, 0)');

        trendChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: '总资产',
                    data: [],
                    borderColor: '#8b5cf6',
                    backgroundColor: gradient,
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4,
                    pointBackgroundColor: '#8b5cf6',
                    pointBorderColor: '#fff',
                    pointBorderWidth: 2,
                    pointRadius: 5,
                    pointHoverRadius: 7
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    x: {
                        grid: { color: 'rgba(255,255,255,0.1)' },
                        ticks: { color: '#8b8b8b' }
                    },
                    y: {
                        grid: { color: 'rgba(255,255,255,0.1)' },
                        ticks: {
                            color: '#8b8b8b',
                            callback: (value) => Utils.formatMoney(value)
                        }
                    }
                }
            }
        });

        updateTrendChart();
    }

    function updateTrendChart() {
        if (!trendChart) return;

        const data = generateTrendData();
        trendChart.data.labels = data.labels;
        trendChart.data.datasets[0].data = data.values;
        trendChart.update();
    }

    function generateTrendData() {
        const periods = {
            '1month': { days: 30, format: 'MM-DD' },
            '3months': { days: 90, format: 'MM-DD' },
            '6months': { days: 180, format: 'YYYY-MM' },
            '1year': { days: 365, format: 'YYYY-MM' }
        };

        const config = periods[currentPeriod];
        const labels = [];
        const values = [];

        // 1. 先对记录进行预处理，确保每个(member_id, name)组合只保留最新的一条记录
        const latestRecordsMap = {}; // key: member_id_name
        allRecords.forEach(r => {
            const assetKey = `${r.member_id}_${r.name}`;
            const existing = latestRecordsMap[assetKey];
            if (!existing) {
                latestRecordsMap[assetKey] = r;
            } else {
                // 如果当前记录日期比现有记录更新，或日期相同但ID更大，替换
                if (new Date(r.date) > new Date(existing.date) || 
                    (new Date(r.date).getTime() === new Date(existing.date).getTime() && r.id > existing.id)) {
                    latestRecordsMap[assetKey] = r;
                }
            }
        });
        const latestRecords = Object.values(latestRecordsMap);

        // 2. 按日期升序排序去重后的记录（从早到晚）
        const sortedRecords = [...latestRecords].sort((a, b) => new Date(a.date) - new Date(b.date));

        // 3. 构建按日期排序的时间线快照
        const timeline = [];
        const currentAssets = {}; // 跟踪每个资产的最新值

        sortedRecords.forEach(r => {
            const date = new Date(r.date);
            let key;
            if (config.format === 'MM-DD') {
                key = `${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
            } else {
                key = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
            }

            // 更新该资产到最新值（按成员+资产名称分组）
            const assetKey = `${r.member_id}_${r.name}`;
            currentAssets[assetKey] = r.value;

            // 查找 timeline 中是否已有相同 key 的条目
            const existingEntry = timeline.find(entry => entry.dateStr === key);
            if (existingEntry) {
                // 同一日期有多个记录，更新该日期的资产快照
                existingEntry.assetValues = { ...currentAssets };
            } else {
                // 新日期，保存当前所有资产的快照
                timeline.push({
                    dateStr: key,
                    assetValues: { ...currentAssets }
                });
            }
        });

        // 3. 生成图表需要的日期范围
        const now = new Date();
        const step = Math.max(1, Math.floor(config.days / 30));

        for (let i = config.days; i >= 0; i -= step) {
            const date = new Date(now);
            date.setDate(date.getDate() - i);
            let key;
            if (config.format === 'MM-DD') {
                key = `${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
            } else {
                key = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
            }

            if (!labels.includes(key)) {
                labels.push(key);

                // 4. 查找该日期之前最新的资产快照
                let latestSnapshot = null;
                for (const entry of timeline) {
                    // 简单字符串比较在 MM-DD 和 YYYY-MM 格式下都有效
                    if (entry.dateStr <= key) {
                        latestSnapshot = entry.assetValues;
                    } else {
                        break;
                    }
                }

                // 5. 计算总资产
                let dayTotal = 0;
                if (latestSnapshot) {
                    dayTotal = Object.values(latestSnapshot).reduce((sum, val) => sum + val, 0);
                }

                values.push(dayTotal);
            }
        }

        return { labels, values };
    }

    function initDistributionChart() {
        const ctx = document.getElementById('distributionChart').getContext('2d');
        distributionChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: [],
                datasets: [{
                    data: [],
                    backgroundColor: [],
                    borderWidth: 0,
                    hoverOffset: 10
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'right',
                        labels: {
                            color: '#eaeaea',
                            padding: 15,
                            usePointStyle: true,
                            pointStyle: 'circle'
                        }
                    }
                }
            }
        });
    }

    function updateDistributionChart(distribution) {
        if (!distributionChart) return;

        const labels = distribution.map(d => d.display_name || d.type);
        const data = distribution.map(d => d.total_value);
        const colors = distribution.map(d => d.color || '#8b5cf6');

        distributionChart.data.labels = labels;
        distributionChart.data.datasets[0].data = data;
        distributionChart.data.datasets[0].backgroundColor = colors;
        distributionChart.update();
    }

    function initMemberChart() {
        const ctx = document.getElementById('memberChart').getContext('2d');
        memberChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: [],
                datasets: [{
                    label: '资产价值',
                    data: [],
                    backgroundColor: [
                        '#8b5cf6',
                        '#3b82f6',
                        '#10b981',
                        '#f59e0b',
                        '#ec4899'
                    ],
                    borderRadius: 8,
                    borderSkipped: false
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    x: {
                        grid: { color: 'rgba(255,255,255,0.1)' },
                        ticks: { color: '#8b8b8b' }
                    },
                    y: {
                        grid: { color: 'rgba(255,255,255,0.1)' },
                        ticks: {
                            color: '#8b8b8b',
                            callback: (value) => Utils.formatMoney(value)
                        }
                    }
                }
            }
        });

        updateMemberChart();
    }

    function updateMemberChart() {
        if (!memberChart || !members.length) return;

        const labels = members.map(m => m.name);
        const data = members.map(m => m.total_value || 0);

        memberChart.data.labels = labels;
        memberChart.data.datasets[0].data = data;
        memberChart.update();
    }

    function openRecordModal() {
        addRecordModal.classList.add('active');
    }

    function closeModal() {
        addRecordModal.classList.remove('active');
        recordForm.reset();
        setTodayDate();
    }

    async function handleRecordSubmit(e) {
        e.preventDefault();

        let targetMemberId = user?.memberId;
        if (isHead) {
            targetMemberId = parseInt(document.getElementById('recordMemberId').value, 10);
        }
        // 确保 memberId 是数字
        if (typeof targetMemberId === 'string') {
            targetMemberId = parseInt(targetMemberId, 10);
        }

        const data = {
            memberId: targetMemberId,
            type: document.getElementById('recordType').value,
            name: document.getElementById('recordName').value,
            value: parseFloat(document.getElementById('recordValue').value),
            date: document.getElementById('recordDate').value,
            note: document.getElementById('recordNote').value
        };

        try {
            const res = await API.createRecord(data);
            if (res.success) {
                Utils.toast('记录添加成功');
                closeModal();
                await loadAllData();
            } else {
                Utils.toast(res.message || '添加失败', 'error');
            }
        } catch (e) {
            Utils.toast('网络错误，请稍后重试', 'error');
        }
    }
})();
