<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资产管家 - 资产记录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .tab-btn:hover {
            background: var(--bg-hover);
        }
        .tab-btn.active {
            background: var(--accent);
            color: white;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .action-btn {
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            margin-left: 6px;
        }
        .view-btn {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
        }
        .edit-btn {
            background: rgba(139, 92, 246, 0.15);
            color: var(--accent);
        }
        .delete-btn {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
        }
        .timeline {
            padding: 20px 0;
        }
        .timeline-item {
            display: flex;
            gap: 16px;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
            position: relative;
        }
        .timeline-item:last-child {
            border-bottom: none;
        }
        .timeline-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
            margin-top: 4px;
        }
        .timeline-content {
            flex: 1;
        }
        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .timeline-title {
            font-weight: 600;
            font-size: 14px;
        }
        .timeline-date {
            font-size: 12px;
            color: var(--text-muted);
        }
        .timeline-body {
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }
        .timeline-member {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .timeline-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 12px;
            color: white;
        }
        .timeline-asset {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        .timeline-type-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .timeline-values {
            display: flex;
            gap: 16px;
            margin-top: 8px;
            align-items: center;
        }
        .value-old {
            color: var(--text-muted);
            text-decoration: line-through;
        }
        .value-new {
            font-weight: 700;
        }
        .change-positive {
            color: var(--success);
        }
        .change-negative {
            color: var(--danger);
        }
        .detail-modal .detail-header {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .detail-avatar {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 24px;
            color: white;
        }
        .detail-info h3 {
            margin-bottom: 4px;
        }
        .detail-grid {
            display: grid;
            gap: 12px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .detail-row:last-child {
            border-bottom: none;
        }
        .detail-label {
            color: var(--text-muted);
            font-size: 13px;
        }
        .detail-value {
            font-weight: 600;
        }
        .detail-note {
            margin-top: 16px;
            padding: 12px;
            background: var(--bg-hover);
            border-radius: 8px;
            font-size: 13px;
        }
        .autocomplete-container {
            position: relative;
        }
        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            margin-top: 4px;
            background: rgba(26, 26, 46, 1);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
        }
        .autocomplete-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        .autocomplete-item:last-child {
            border-bottom: none;
        }
        .autocomplete-item:hover {
            background: var(--bg-hover);
        }
        .autocomplete-item.selected {
            background: var(--accent);
            color: white;
        }
        .autocomplete-highlight {
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>🏠 资产管家</h1>
            <p>家庭资产管理平台</p>
        </div>
        <nav class="nav" id="nav">
            <a href="/dashboard.html" class="nav-item" data-page="dashboard">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path>
                    <polyline points="9,22 9,12 15,12 15,22"></polyline>
                </svg>
                资产概览
            </a>
            <a href="/records.html" class="nav-item active" data-page="records">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                资产记录
            </a>
            <a href="/members.html" class="nav-item" data-page="members" id="nav-members">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 00-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 010 7.75"></path>
                </svg>
                家庭成员
            </a>
            <a href="/asset-types.html" class="nav-item" data-page="asset-types" id="nav-asset-types">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
                </svg>
                资产类型
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="nav-item" id="logoutBtn" style="color: var(--danger);">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"></path>
                    <polyline points="16,17 21,12 16,7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                退出登录
            </div>
        </div>
    </aside>

    <main class="main">
        <header class="header">
            <div class="header-title">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <button class="mobile-menu-btn" id="menuBtn">☰</button>
                    <div>
                        <h2>资产记录</h2>
                        <p>管理所有资产记录</p>
                    </div>
                </div>
            </div>
            <div class="header-actions">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">?</div>
                    <div>
                        <div style="font-size: 14px; font-weight: 600;" id="userName">用户</div>
                        <div style="font-size: 12px; color: var(--text-muted);" id="userRole">角色</div>
                    </div>
                </div>
            </div>
        </header>

        <section class="content">
            <div class="stats-grid" id="statsGrid">
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="list">记录列表</button>
                <button class="tab-btn" data-tab="timeline">变更时间线</button>
            </div>

            <div class="filter-bar" id="filterBar">
                <select class="form-control" id="memberFilter">
                    <option value="">全部成员</option>
                </select>
                <select class="form-control" id="typeFilter">
                    <option value="">全部类型</option>
                </select>
                <select class="form-control" id="nameFilter">
                    <option value="">全部资产名称</option>
                </select>
                <input type="date" class="form-control" id="startDate" placeholder="开始日期">
                <input type="date" class="form-control" id="endDate" placeholder="结束日期">
                <input type="text" class="form-control" id="searchKeyword" placeholder="搜索...">
                <button class="btn btn-secondary" id="exportBtn">导出 CSV</button>
                <button class="btn btn-primary" id="addRecordBtn">➕ 添加记录</button>
            </div>

            <div id="listContent">
                <div class="card">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>成员</th>
                                    <th>资产名称</th>
                                    <th>类型</th>
                                    <th>价值</th>
                                    <th>日期</th>
                                    <th style="text-align: right;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="recordsTableBody">
                                <tr><td colspan="6" class="empty-state">暂无数据</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="timelineContent" style="display: none;">
                <div class="card">
                    <div class="timeline" id="timelineList">
                        <div class="empty-state">暂无变更记录</div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</div>

<div class="modal-overlay" id="recordModal">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modalTitle">添加资产记录</h3>
            <button class="modal-close" id="closeModalBtn">×</button>
        </div>
        <div class="modal-body">
            <form id="recordForm">
                <input type="hidden" id="recordId">
                <div class="form-group" id="memberFormGroup">
                    <label>成员</label>
                    <select id="memberId" class="form-control" required>
                    </select>
                </div>
                <div class="form-group">
                    <label>资产类型</label>
                    <select id="recordType" class="form-control" required>
                    </select>
                </div>
                <div class="form-group">
                    <label>资产名称</label>
                    <div class="autocomplete-container">
                        <input type="text" id="recordName" class="form-control" required placeholder="例如：招商银行股票">
                        <div class="autocomplete-list" id="recordNameAutocomplete"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label>当前价值</label>
                    <input type="number" id="recordValue" class="form-control" required step="0.01" placeholder="0">
                </div>
                <div class="form-group">
                    <label>记录日期</label>
                    <input type="date" id="recordDate" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>备注（可选）</label>
                    <textarea id="recordNote" class="form-control" rows="3" placeholder="备注"></textarea>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" id="cancelBtn">取消</button>
            <button type="submit" class="btn btn-primary" id="saveRecordBtn">保存</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="detailModal">
    <div class="modal detail-modal">
        <div class="modal-header">
            <h3>资产记录详情</h3>
            <button class="modal-close" id="closeDetailModal">×</button>
        </div>
        <div class="modal-body" id="detailContent">
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" id="closeDetailBtn">关闭</button>
            <button type="button" class="btn btn-primary" id="editFromDetailBtn">编辑记录</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="deleteModal">
    <div class="modal" style="max-width: 420px;">
        <div class="modal-header">
            <h3>删除记录</h3>
            <button class="modal-close" id="closeDeleteBtn">×</button>
        </div>
        <div class="modal-body">
            <p>确定要删除这条资产记录吗？此操作无法撤销。</p>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" id="cancelDeleteBtn">取消</button>
            <button class="btn btn-danger" id="confirmDeleteBtn">删除</button>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script>
(function() {
    console.log('records.js 初始化开始执行');

    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/login.html';
        return;
    }

    const user = API.getCurrentUser();
    const isHead = user?.role === 'head';
    const isMember = user?.role === 'member';
    const isAdmin = user?.role === 'admin';

    let members = [];
    let assetTypes = [];
    let allRecords = [];
    let editingId = null;
    let deletingId = null;
    let currentTab = 'list';
    let assetNames = [];
    let autocompleteIndex = -1;

    const sidebar = document.getElementById('sidebar');
    const menuBtn = document.getElementById('menuBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const userAvatar = document.getElementById('userAvatar');
    const userName = document.getElementById('userName');
    const userRole = document.getElementById('userRole');
    const recordsTableBody = document.getElementById('recordsTableBody');
    const memberFilter = document.getElementById('memberFilter');
    const typeFilter = document.getElementById('typeFilter');
    const nameFilter = document.getElementById('nameFilter');
    const startDateInput = document.getElementById('startDate');
    const endDateInput = document.getElementById('endDate');
    const searchKeyword = document.getElementById('searchKeyword');
    const addRecordBtn = document.getElementById('addRecordBtn');
    const exportBtn = document.getElementById('exportBtn');
    const recordModal = document.getElementById('recordModal');
    const detailModal = document.getElementById('detailModal');
    const deleteModal = document.getElementById('deleteModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const closeDetailModal = document.getElementById('closeDetailModal');
    const closeDetailBtn = document.getElementById('closeDetailBtn');
    const editFromDetailBtn = document.getElementById('editFromDetailBtn');
    const closeDeleteBtn = document.getElementById('closeDeleteBtn');
    const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
    const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');
    const recordForm = document.getElementById('recordForm');
    const modalTitle = document.getElementById('modalTitle');
    const memberFormGroup = document.getElementById('memberFormGroup');
    const navMembers = document.getElementById('nav-members');
    const navAssetTypes = document.getElementById('nav-asset-types');
    const statsGrid = document.getElementById('statsGrid');
    const listContent = document.getElementById('listContent');
    const timelineContent = document.getElementById('timelineContent');
    const timelineList = document.getElementById('timelineList');
    const saveRecordBtn = document.getElementById('saveRecordBtn');

    console.log('DOM 元素获取完成');

    // 旧的 init() 函数已移除，新的 init() 函数在文件末尾

    function setupUserInfo() {
        userName.textContent = user?.name || user?.username || '用户';
        userRole.textContent = Utils.getRoleLabel(user?.role);
        userAvatar.textContent = Utils.getShortName(user?.name || user?.username);
    }

    function setupNav() {
        if (isAdmin) {
            navMembers.style.display = 'none';
            navAssetTypes.style.display = 'none';
        } else {
            if (isMember) {
                navMembers.style.display = 'none';
                navAssetTypes.style.display = 'none';
            }
        }
    }

    function setupEventListeners() {
        console.log('setupEventListeners() 开始');
        
        menuBtn.addEventListener('click', () => sidebar.classList.toggle('open'));
        logoutBtn.addEventListener('click', () => {
            if (confirm('确定要退出登录吗？')) API.logout();
        });

        memberFilter.addEventListener('change', applyFilters);
        typeFilter.addEventListener('change', applyFilters);
        nameFilter.addEventListener('change', applyFilters);
        startDateInput.addEventListener('change', applyFilters);
        endDateInput.addEventListener('change', applyFilters);
        searchKeyword.addEventListener('input', Utils.debounce(applyFilters, 300));

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
        });

        console.log('addRecordBtn:', addRecordBtn);
        addRecordBtn.addEventListener('click', () => {
            console.log('点击了添加记录按钮');
            openModal();
        });

        exportBtn.addEventListener('click', exportRecords);

        closeModalBtn.addEventListener('click', closeModal);
        cancelBtn.addEventListener('click', closeModal);
        recordModal.addEventListener('click', e => {
            if (e.target === recordModal) closeModal();
        });

        closeDetailModal.addEventListener('click', closeDetail);
        closeDetailBtn.addEventListener('click', closeDetail);
        editFromDetailBtn.addEventListener('click', editFromDetail);
        detailModal.addEventListener('click', e => {
            if (e.target === detailModal) closeDetail();
        });

        closeDeleteBtn.addEventListener('click', closeDeleteModal);
        cancelDeleteBtn.addEventListener('click', closeDeleteModal);
        deleteModal.addEventListener('click', e => {
            if (e.target === deleteModal) closeDeleteModal();
        });

        confirmDeleteBtn.addEventListener('click', doDelete);

        console.log('绑定表单事件');
        recordForm.addEventListener('submit', function(e) {
            console.log('表单提交事件触发');
            e.preventDefault();
            handleSubmit();
        });

        saveRecordBtn.addEventListener('click', function(e) {
            console.log('保存按钮点击事件触发');
            e.preventDefault();
            handleSubmit();
        });

        console.log('setupEventListeners() 执行完成');
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.tab === tab);
        });
        listContent.style.display = tab === 'list' ? 'block' : 'none';
        timelineContent.style.display = tab === 'timeline' ? 'block' : 'none';
        if (tab === 'timeline') {
            renderTimeline();
        }
    }

    function setTodayDate() {
        const today = new Date().toISOString().split('T')[0];
        const recordDateEl = document.getElementById('recordDate');
        if (recordDateEl) {
            recordDateEl.value = today;
        }
    }

    async function loadStats() {
        try {
            const res = await API.getStats();
            if (res.success) {
                renderStats(res.data);
            }
        } catch (e) {
            console.error('Failed to load stats:', e);
        }
    }

    function renderStats(stats) {
        const totalRecords = stats.totalRecords || 0;
        const monthlyNew = stats.monthlyNew || 0;
        const totalValue = stats.totalValue || 0;

        statsGrid.innerHTML = `
            <div class="card stat-card">
                <div class="stat-label">总记录数</div>
                <div class="stat-value">${totalRecords}</div>
            </div>
            <div class="card stat-card">
                <div class="stat-label">本月新增</div>
                <div class="stat-value">+${monthlyNew}</div>
            </div>
            <div class="card stat-card">
                <div class="stat-label">总资产</div>
                <div class="stat-value">${Utils.formatMoney(totalValue)}</div>
            </div>
        `;
    }

    async function loadMembers() {
        try {
            const res = await API.getMembers();
            if (res.success) {
                members = res.data;
                renderMemberFilters();
            }
        } catch (e) {
            console.error('Failed to load members:', e);
        }
    }

    function renderMemberFilters() {
        let options = '<option value="">全部成员</option>';
        members.forEach(m => {
            options += `<option value="${m.id}">${m.name}</option>`;
        });
        memberFilter.innerHTML = options;

        const memberIdSelect = document.getElementById('memberId');
        if (memberIdSelect) {
            if (isMember) {
                memberFormGroup.style.display = 'none';
            } else {
                memberFormGroup.style.display = '';
                memberIdSelect.innerHTML = members.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
            }
        }
    }

    async function loadAssetTypes() {
        try {
            const res = await API.getAssetTypes();
            if (res.success) {
                assetTypes = res.data;
                renderTypeFilters();
            }
        } catch (e) {
            console.error('Failed to load asset types:', e);
        }
    }

    function renderTypeFilters() {
        let options = '<option value="">全部类型</option>';
        assetTypes.forEach(t => {
            options += `<option value="${t.type_value}">${t.display_name}</option>`;
        });
        typeFilter.innerHTML = options;

        const recordTypeSelect = document.getElementById('recordType');
        if (recordTypeSelect) {
            recordTypeSelect.innerHTML = assetTypes.map(t => `<option value="${t.type_value}">${t.display_name}</option>`).join('');
        }
    }

    async function loadAssetNames() {
        try {
            const res = await API.getAssetNames();
            if (res.success) {
                assetNames = res.data;
                renderNameFilters();
            }
        } catch (e) {
            console.error('Failed to load asset names:', e);
        }
    }

    function renderNameFilters() {
        let options = '<option value="">全部资产名称</option>';
        assetNames.forEach(n => {
            options += `<option value="${n}">${n}</option>`;
        });
        nameFilter.innerHTML = options;
    }

    async function loadRecords() {
        try {
            const res = await API.getRecords();
            if (res.success) {
                allRecords = res.data;
                applyFilters();
            }
        } catch (e) {
            console.error('Failed to load records:', e);
        }
    }

    function applyFilters() {
        let filtered = [...allRecords];

        const memberId = memberFilter.value;
        if (memberId) filtered = filtered.filter(r => String(r.member_id) === memberId);

        const type = typeFilter.value;
        if (type) filtered = filtered.filter(r => r.type === type);

        const name = nameFilter.value;
        if (name) filtered = filtered.filter(r => r.name === name);

        const start = startDateInput.value;
        if (start) filtered = filtered.filter(r => r.date >= start);

        const end = endDateInput.value;
        if (end) filtered = filtered.filter(r => r.date <= end);

        const keyword = searchKeyword.value.trim().toLowerCase();
        if (keyword) filtered = filtered.filter(r =>
            r.name.toLowerCase().includes(keyword) ||
            (r.member_name && r.member_name.toLowerCase().includes(keyword))
        );

        if (currentTab === 'list') {
            renderRecords(filtered);
        } else {
            renderTimeline(filtered);
        }
    }

    function renderRecords(records) {
        if (!records.length) {
            recordsTableBody.innerHTML = '<tr><td colspan="6" class="empty-state">暂无数据</td></tr>';
            return;
        }

        const typeColors = {};
        assetTypes.forEach(t => typeColors[t.type_value] = t.color);

        recordsTableBody.innerHTML = records.map(r => {
            const type = assetTypes.find(t => t.type_value === r.type);
            const change = r.previous_value != null ? r.value - r.previous_value : null;

            return `
                <tr>
                    <td>${r.member_name || ''}</td>
                    <td style="font-weight: 600;">${r.name}</td>
                    <td>
                        <span style="display: inline-flex; align-items: center; gap: 8px;">
                            <span style="width: 10px; height: 10px; border-radius: 50%; background: ${type?.color || '#8b5cf6'};"></span>
                            ${type?.display_name || r.type}
                        </span>
                    </td>
                    <td>
                        <div style="font-weight: 700;">${Utils.formatMoney(r.value)}</div>
                        ${change != null ? `<div style="font-size: 12px; color: ${change >= 0 ? 'var(--success)' : 'var(--danger)'};">
                            ${change >= 0 ? '↑' : '↓'} ${Utils.formatMoney(Math.abs(change))}
                        </div>` : ''}
                    </td>
                    <td>${Utils.formatDate(r.date)}</td>
                    <td style="text-align: right;">
                        <button class="action-btn view-btn" onclick="openDetail(${r.id})">查看</button>
                        <button class="action-btn edit-btn" onclick="openEditModal(${r.id})">编辑</button>
                        <button class="action-btn delete-btn" onclick="confirmDelete(${r.id})">删除</button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function renderTimeline(records) {
        const timelineRecords = records || allRecords;
        if (!timelineRecords.length) {
            timelineList.innerHTML = '<div class="empty-state">暂无变更记录</div>';
            return;
        }

        const typeColors = {};
        assetTypes.forEach(t => typeColors[t.type_value] = t.color);

        const sortedRecords = [...timelineRecords].sort((a, b) => new Date(b.date) - new Date(a.date));

        timelineList.innerHTML = sortedRecords.map(r => {
            const type = assetTypes.find(t => t.type_value === r.type);
            const change = r.previous_value != null ? r.value - r.previous_value : null;

            return `
                <div class="timeline-item">
                    <div class="timeline-dot" style="background: ${type?.color || '#8b5cf6'};"></div>
                    <div class="timeline-content">
                        <div class="timeline-header">
                            <span class="timeline-title">${r.name}</span>
                            <span class="timeline-date">${Utils.formatDate(r.date)}</span>
                        </div>
                        <div class="timeline-body">
                            <div class="timeline-member">
                                <div class="timeline-avatar">${Utils.getShortName(r.member_name || 'U')}</div>
                                <span>${r.member_name || ''}</span>
                            </div>
                            <div class="timeline-asset">
                                <span class="timeline-type-dot" style="background: ${type?.color || '#8b5cf6'};"></span>
                                <span>${type?.display_name || r.type}</span>
                            </div>
                        </div>
                        <div class="timeline-values">
                            ${r.previous_value != null ? `<span class="value-old">${Utils.formatMoney(r.previous_value)}</span>` : ''}
                            <span>→</span>
                            <span class="value-new">${Utils.formatMoney(r.value)}</span>
                            ${change != null ? `<span class="${change >= 0 ? 'change-positive' : 'change-negative'}">
                                ${change >= 0 ? '↑' : '↓'} ${Utils.formatMoney(Math.abs(change))}
                            </span>` : ''}
                        </div>
                        <div style="margin-top: 8px;">
                            <button class="action-btn view-btn" onclick="openDetail(${r.id})">查看详情</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    window.openDetail = openDetail;
    function openDetail(id) {
        const record = allRecords.find(r => r.id === id);
        if (!record) return;

        const type = assetTypes.find(t => t.type_value === record.type);
        const change = record.previous_value != null ? record.value - record.previous_value : null;

        document.getElementById('detailContent').innerHTML = `
            <div class="detail-header">
                <div class="detail-avatar">${Utils.getShortName(record.member_name || 'U')}</div>
                <div class="detail-info">
                    <h3>${record.name}</h3>
                    <p style="color: var(--text-muted); font-size: 13px;">${record.member_name || ''}</p>
                </div>
            </div>
            <div class="detail-grid">
                <div class="detail-row">
                    <span class="detail-label">资产类型</span>
                    <span class="detail-value" style="display: inline-flex; align-items: center; gap: 8px;">
                        <span style="width: 12px; height: 12px; border-radius: 50%; background: ${type?.color || '#8b5cf6'};"></span>
                        ${type?.display_name || record.type}
                    </span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">当前价值</span>
                    <span class="detail-value">${Utils.formatMoney(record.value)}</span>
                </div>
                ${change != null ? `
                <div class="detail-row">
                    <span class="detail-label">价值变动</span>
                    <span class="detail-value" style="color: ${change >= 0 ? 'var(--success)' : 'var(--danger)'};">
                        ${change >= 0 ? '↑' : '↓'} ${Utils.formatMoney(Math.abs(change))}
                    </span>
                </div>
                ` : ''}
                <div class="detail-row">
                    <span class="detail-label">记录日期</span>
                    <span class="detail-value">${Utils.formatDate(record.date)}</span>
                </div>
            </div>
            ${record.note ? `<div class="detail-note">${record.note}</div>` : ''}
            <div class="detail-footer">
                创建时间：${record.created_at || '未知'}
            </div>
        `;

        detailModal.classList.add('active');
    }

    function closeDetail() {
        detailModal.classList.remove('active');
    }

    let detailRecordId = null;
    function editFromDetail() {
        const record = allRecords.find(r => r.id === detailRecordId);
        closeDetail();
        if (record) {
            openEditModal(record.id);
        }
    }

    window.openEditModal = openEditModal;
    function openEditModal(id) {
        editingId = id;
        detailRecordId = id;
        const record = allRecords.find(r => r.id === id);
        if (!record) return;

        modalTitle.textContent = '编辑资产记录';
        const recordIdInput = document.getElementById('recordId');
        if (recordIdInput) recordIdInput.value = record.id;

        const recordNameInput = document.getElementById('recordName');
        if (recordNameInput) recordNameInput.value = record.name;

        const recordTypeSelect = document.getElementById('recordType');
        if (recordTypeSelect) recordTypeSelect.value = record.type;

        const recordValueInput = document.getElementById('recordValue');
        if (recordValueInput) recordValueInput.value = record.value;

        const recordDateInput = document.getElementById('recordDate');
        if (recordDateInput) recordDateInput.value = record.date;

        const recordNoteInput = document.getElementById('recordNote');
        if (recordNoteInput) recordNoteInput.value = record.note || '';

        if (isHead || isAdmin) {
            const memberIdSelect = document.getElementById('memberId');
            if (memberIdSelect) memberIdSelect.value = record.member_id;
        }

        recordModal.classList.add('active');
    }

    function openModal() {
        editingId = null;
        detailRecordId = null;
        modalTitle.textContent = '添加资产记录';
        recordForm.reset();
        setTodayDate();

        if ((isHead || isAdmin) && members.length) {
            const memberIdSelect = document.getElementById('memberId');
            if (memberIdSelect) memberIdSelect.value = members[0].id;
        }

        recordModal.classList.add('active');
    }

    function closeModal() {
        recordModal.classList.remove('active');
        editingId = null;
    }

    window.confirmDelete = confirmDelete;
    function confirmDelete(id) {
        deletingId = id;
        deleteModal.classList.add('active');
    }

    function closeDeleteModal() {
        deleteModal.classList.remove('active');
        deletingId = null;
    }

    async function doDelete() {
        if (!deletingId) return;

        try {
            const res = await API.deleteRecord(deletingId);
            if (res.success) {
                Utils.toast('删除成功');
                closeDeleteModal();
                await Promise.all([loadRecords(), loadStats()]);
            } else {
                Utils.toast(res.message || '删除失败', 'error');
            }
        } catch (e) {
            Utils.toast('网络错误，请稍后重试', 'error');
        }
    }

    async function handleSubmit() {
        console.log('handleSubmit() 函数开始执行');

        let memberIdVal = user?.memberId;
        if (isHead || isAdmin) {
            const memberIdSelect = document.getElementById('memberId');
            if (memberIdSelect) memberIdVal = parseInt(memberIdSelect.value, 10);
        }
        // 确保 memberId 是数字
        if (typeof memberIdVal === 'string') {
            memberIdVal = parseInt(memberIdVal, 10);
        }

        const recordTypeVal = document.getElementById('recordType').value;
        const recordNameVal = document.getElementById('recordName').value;
        const recordValueVal = parseFloat(document.getElementById('recordValue').value);
        const recordDateVal = document.getElementById('recordDate').value;
        const recordNoteVal = document.getElementById('recordNote').value;

        console.log('要提交的数据:', {
            memberId: memberIdVal,
            memberIdType: typeof memberIdVal,
            type: recordTypeVal,
            name: recordNameVal,
            value: recordValueVal,
            date: recordDateVal,
            note: recordNoteVal
        });

        if (!recordTypeVal || !recordNameVal || !recordValueVal || !recordDateVal) {
            Utils.toast('请填写所有必填项', 'error');
            return;
        }

        const data = {
            memberId: memberIdVal,
            type: recordTypeVal,
            name: recordNameVal,
            value: recordValueVal,
            date: recordDateVal,
            note: recordNoteVal
        };

        try {
            let res;
            if (editingId) {
                res = await API.updateRecord(editingId, data);
            } else {
                res = await API.createRecord(data);
            }

            console.log('API 响应:', res);

            if (res.success) {
                Utils.toast(editingId ? '更新成功' : '添加成功');
                closeModal();
                await Promise.all([loadRecords(), loadStats()]);
            } else {
                Utils.toast(res.message || '操作失败', 'error');
            }
        } catch (e) {
            console.error('提交错误:', e);
            Utils.toast('网络错误，请稍后重试', 'error');
        }
    }

    function exportRecords() {
        const params = {};
        if (memberFilter.value) params.memberId = memberFilter.value;
        if (typeFilter.value) params.type = typeFilter.value;
        if (startDateInput.value) params.startDate = startDateInput.value;
        if (endDateInput.value) params.endDate = endDateInput.value;
        API.exportCSV(params);
    }

    async function loadAssetNames() {
        try {
            const res = await API.getAssetNames();
            if (res.success) {
                assetNames = res.data;
            }
        } catch (e) {
            console.error('Failed to load asset names:', e);
        }
    }

    function setupAutocomplete() {
        const recordNameInput = document.getElementById('recordName');
        const autocompleteList = document.getElementById('recordNameAutocomplete');
        let debounceTimer = null;

        recordNameInput.addEventListener('focus', async () => {
            if (recordNameInput.value.trim()) {
                await showAutocomplete(recordNameInput.value.trim());
            } else {
                await showAutocomplete('');
            }
        });

        recordNameInput.addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(async () => {
                await showAutocomplete(e.target.value.trim());
            }, 200);
        });

        recordNameInput.addEventListener('keydown', (e) => {
            const items = autocompleteList.querySelectorAll('.autocomplete-item');
            if (items.length === 0) return;

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                autocompleteIndex = (autocompleteIndex + 1) % items.length;
                updateAutocompleteSelection(items);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                autocompleteIndex = (autocompleteIndex - 1 + items.length) % items.length;
                updateAutocompleteSelection(items);
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (autocompleteIndex >= 0 && items[autocompleteIndex]) {
                    selectAutocompleteItem(items[autocompleteIndex]);
                }
            } else if (e.key === 'Escape') {
                hideAutocomplete();
            }
        });

        document.addEventListener('click', (e) => {
            if (!recordNameInput.contains(e.target) && !autocompleteList.contains(e.target)) {
                hideAutocomplete();
            }
        });
    }

    async function showAutocomplete(keyword) {
        const autocompleteList = document.getElementById('recordNameAutocomplete');
        
        let filteredNames = assetNames;
        if (keyword) {
            filteredNames = assetNames.filter(name => name.toLowerCase().includes(keyword.toLowerCase()));
        }

        if (filteredNames.length === 0) {
            hideAutocomplete();
            return;
        }

        autocompleteIndex = -1;
        autocompleteList.innerHTML = filteredNames.slice(0, 10).map(name => {
            let displayName = name;
            if (keyword) {
                const regex = new RegExp(`(${keyword})`, 'gi');
                displayName = name.replace(regex, '<span class="autocomplete-highlight">$1</span>');
            }
            return `<div class="autocomplete-item" data-name="${name}">${displayName}</div>`;
        }).join('');

        autocompleteList.querySelectorAll('.autocomplete-item').forEach((item, index) => {
            item.addEventListener('click', () => {
                selectAutocompleteItem(item);
            });
            item.addEventListener('mouseenter', () => {
                autocompleteIndex = index;
                const items = autocompleteList.querySelectorAll('.autocomplete-item');
                updateAutocompleteSelection(items);
            });
        });

        autocompleteList.style.display = 'block';
    }

    function hideAutocomplete() {
        const autocompleteList = document.getElementById('recordNameAutocomplete');
        autocompleteList.style.display = 'none';
        autocompleteList.innerHTML = '';
        autocompleteIndex = -1;
    }

    function updateAutocompleteSelection(items) {
        items.forEach((item, index) => {
            item.classList.toggle('selected', index === autocompleteIndex);
        });
    }

    function selectAutocompleteItem(item) {
        const recordNameInput = document.getElementById('recordName');
        recordNameInput.value = item.dataset.name;
        hideAutocomplete();
    }

    init();

    async function init() {
        console.log('init() 函数开始执行');
        setupUserInfo();
        setupNav();
        setupEventListeners();
        setupAutocomplete();
        setTodayDate();
        
        await loadAssetTypes();
        await Promise.all([
            loadStats(),
            loadMembers(),
            loadRecords(),
            loadAssetNames()
        ]);
        
        const savedType = localStorage.getItem('recordFilterType');
        if (savedType) {
            typeFilter.value = savedType;
            localStorage.removeItem('recordFilterType');
            applyFilters();
        }
        console.log('init() 函数执行完成');
    }
})();
</script>
</body>
</html>
