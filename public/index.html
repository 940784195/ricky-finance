<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>资产管家 - 资产概览</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="css/common.css">
  <style>
    .dashboard-content {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }
    .stats-card {
      transition: all 0.3s ease;
    }
    .stats-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
    }
    .stat-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .stat-icon.primary { background: linear-gradient(135deg, rgba(167, 139, 250, 0.2), rgba(124, 58, 237, 0.1)); color: var(--color-button-primary-background); }
    .stat-icon.green { background: linear-gradient(135deg, rgba(74, 222, 128, 0.2), rgba(34, 197, 94, 0.1)); color: var(--color-page-text-positive); }
    .stat-icon.red { background: linear-gradient(135deg, rgba(248, 113, 113, 0.2), rgba(239, 68, 68, 0.1)); color: var(--color-page-text-negative); }
    .stat-icon.blue { background: linear-gradient(135deg, rgba(96, 165, 250, 0.2), rgba(59, 130, 246, 0.1)); color: var(--color-fund-type); }
    .stat-card-header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .charts-section {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    .chart-card {
      background: var(--color-card-background);
      border: 1px solid var(--color-card-border);
      border-radius: 12px;
      padding: 20px;
    }
    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .chart-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--color-page-text);
    }
    .chart-tabs {
      display: flex;
      gap: 8px;
    }
    .chart-tab {
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 500;
      color: var(--color-page-text-subdued);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      font-family: inherit;
    }
    .chart-tab.active {
      background: var(--color-button-primary-background);
      color: var(--color-button-primary-text);
    }
    .chart-tab:hover:not(.active) {
      background: rgba(255, 255, 255, 0.08);
      color: var(--color-page-text);
    }
    .chart-container {
      height: 280px;
      position: relative;
    }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--color-page-text);
    }
    .section-link {
      font-size: 13px;
      color: var(--color-page-text-link);
      text-decoration: none;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .section-link:hover {
      text-decoration: underline;
    }
    .customer-table {
      width: 100%;
      background: var(--color-card-background);
      border-radius: 12px;
      border: 1px solid var(--color-card-border);
      overflow: hidden;
    }
    .table-row {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--color-card-border);
      transition: all 0.2s ease;
    }
    .table-row:hover {
      background: var(--color-table-row-background-hover);
    }
    .table-row:last-child { border-bottom: none; }
    .table-row.table-header {
      background: rgba(255, 255, 255, 0.03);
    }
    .table-cell {
      flex: 1;
      font-size: 14px;
      color: var(--color-page-text);
    }
    .table-cell.small { flex: 0.5; }
    .table-cell.large { flex: 1.5; }
    .table-header .table-cell {
      font-size: 12px;
      font-weight: 600;
      color: var(--color-page-text-subdued);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .customer-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .customer-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--color-button-primary-background), #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: white;
      flex-shrink: 0;
    }
    .customer-name {
      font-weight: 500;
      color: var(--color-page-text);
    }
    .customer-code {
      font-size: 12px;
      color: var(--color-page-text-subdued);
    }
    .asset-value {
      font-weight: 600;
      color: var(--color-page-text);
      font-variant-numeric: tabular-nums;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .status-active { background: rgba(74, 222, 128, 0.15); color: var(--color-page-text-positive); }
    .status-inactive { background: rgba(107, 107, 128, 0.15); color: var(--color-page-text-subdued); }
    .status-pending { background: rgba(245, 158, 11, 0.15); color: var(--color-admin-badge); }
    .table-actions {
      display: flex;
      gap: 8px;
    }
    .action-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--color-page-text-subdued);
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      text-decoration: none;
    }
    .action-btn:hover {
      background: var(--color-button-primary-background);
      color: var(--color-button-primary-text);
    }
    @media (max-width: 1024px) {
      .charts-section { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .table-row { flex-wrap: wrap; gap: 12px; }
      .table-cell { flex: 1; }
      .table-actions { width: 100%; justify-content: flex-end; }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <i class="fas fa-chart-line"></i>
          <h1>资产管家</h1>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-item active" onclick="RickyFinance.navigateTo('overview')">
          <i class="fas fa-home"></i>
          <span>资产概览</span>
        </div>
        <div class="nav-item" onclick="RickyFinance.navigateTo('customers')">
          <i class="fas fa-users"></i>
          <span>客户管理</span>
        </div>
        <div class="nav-item" onclick="RickyFinance.navigateTo('records')">
          <i class="fas fa-file-invoice"></i>
          <span>资产记录</span>
        </div>
        <div class="nav-item" onclick="RickyFinance.navigateTo('analysis')">
          <i class="fas fa-chart-pie"></i>
          <span>数据分析</span>
        </div>
        <div class="nav-item" onclick="RickyFinance.navigateTo('export')">
          <i class="fas fa-download"></i>
          <span>报表导出</span>
        </div>
        <div class="sidebar-divider"></div>
        <div class="nav-item" onclick="RickyFinance.navigateTo('settings')">
          <i class="fas fa-cog"></i>
          <span>系统设置</span>
        </div>
      </nav>
    </aside>

    <main class="main-content">
      <header class="header">
        <div class="header-title">
          <h2>资产概览</h2>
          <p id="headerDate">欢迎回来</p>
        </div>
        <div class="header-actions">
          <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="搜索客户、资产..." id="searchInput" onkeyup="handleSearch()">
          </div>
          <button class="btn btn-normal" onclick="resetSearch()">
            <i class="fas fa-sync-alt"></i>
            <span>刷新</span>
          </button>
          <button class="btn btn-primary" onclick="openAddModal()">
            <i class="fas fa-plus"></i>
            <span>新增记录</span>
          </button>
          <div class="header-user">
            <div class="user-avatar">R</div>
          </div>
        </div>
      </header>

      <div class="page-content dashboard-content">
        <div class="stats-grid">
          <div class="stats-card">
            <div class="stat-card-header-row">
              <span class="stats-card-header">总资产</span>
              <div class="stat-icon primary">
                <i class="fas fa-wallet"></i>
              </div>
            </div>
            <div class="stats-card-value" id="statTotalValue">¥ 0</div>
            <div class="stats-card-change" id="statTotalChange">
              <i class="fas fa-arrow-up"></i>
              <span>加载中...</span>
            </div>
          </div>

          <div class="stats-card">
            <div class="stat-card-header-row">
              <span class="stats-card-header">客户数</span>
              <div class="stat-icon blue">
                <i class="fas fa-users"></i>
              </div>
            </div>
            <div class="stats-card-value" id="statCustomerCount">0</div>
            <div class="stats-card-change" id="statCustomerChange">
              <i class="fas fa-users"></i>
              <span>活跃客户</span>
            </div>
          </div>

          <div class="stats-card">
            <div class="stat-card-header-row">
              <span class="stats-card-header">记录总数</span>
              <div class="stat-icon green">
                <i class="fas fa-file-invoice"></i>
              </div>
            </div>
            <div class="stats-card-value" id="statRecordCount">0</div>
            <div class="stats-card-change" id="statMonthlyNew">
              <i class="fas fa-calendar"></i>
              <span>本月0条</span>
            </div>
          </div>

          <div class="stats-card">
            <div class="stat-card-header-row">
              <span class="stats-card-header">待处理记录</span>
              <div class="stat-icon red">
                <i class="fas fa-clock"></i>
              </div>
            </div>
            <div class="stats-card-value" id="statPendingCount">0</div>
            <div class="stats-card-change" id="statPendingChange">
              <i class="fas fa-check-circle"></i>
              <span>状态正常</span>
            </div>
          </div>
        </div>

        <div class="charts-section">
          <div class="chart-card">
            <div class="chart-header">
              <span class="chart-title">资产趋势</span>
              <div class="chart-tabs">
                <button class="chart-tab active" onclick="switchTrendRange('6m', this)">近6个月</button>
                <button class="chart-tab" onclick="switchTrendRange('1y', this)">近1年</button>
                <button class="chart-tab" onclick="switchTrendRange('all', this)">全部时间</button>
              </div>
            </div>
            <div class="chart-container">
              <canvas id="trendChart"></canvas>
            </div>
          </div>

          <div class="chart-card">
            <div class="chart-header">
              <span class="chart-title">资产配置</span>
            </div>
            <div class="chart-container">
              <canvas id="pieChart"></canvas>
            </div>
          </div>
        </div>

        <div class="section-header">
          <span class="section-title">客户列表</span>
          <a href="customers.html" class="section-link">查看全部</a>
        </div>
        <div class="customer-table">
          <div class="table-row table-header">
            <div class="table-cell large">客户信息</div>
            <div class="table-cell">资产类型</div>
            <div class="table-cell small">资产价值</div>
            <div class="table-cell small">记录数</div>
            <div class="table-cell small">状态</div>
            <div class="table-cell small">操作</div>
          </div>
          <div id="customerTableBody">
            <div class="empty-state">
              <i class="fas fa-spinner empty-icon"></i>
              <div class="empty-title">加载中...</div>
              <div class="empty-message">正在从服务器获取数据</div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="addRecordModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">新增资产记录</span>
        <button class="modal-close" onclick="closeAddModal()">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="modal-body">
        <form id="addRecordForm" novalidate>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label required">客户</label>
              <select class="form-select" id="formCustomer" required>
                <option value="">请选择客户</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label required">资产类型</label>
              <select class="form-select" id="formType" required>
                <option value="">请选择类型</option>
                <option value="stock">股票</option>
                <option value="fund">基金</option>
                <option value="bond">债券</option>
                <option value="realestate">房地产</option>
                <option value="cash">现金</option>
                <option value="other">其他</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label required">资产名称</label>
              <input type="text" class="form-input" id="formName" placeholder="如：招商银行股票" required>
            </div>
            <div class="form-group">
              <label class="form-label required">资产价值 (元)</label>
              <input type="number" class="form-input" id="formValue" placeholder="请输入资产价值" required min="0" step="0.01">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label required">记录日期</label>
              <input type="date" class="form-input" id="formDate" required>
            </div>
            <div class="form-group">
              <label class="form-label">上期价值 (元)</label>
              <input type="number" class="form-input" id="formPreviousValue" placeholder="用于计算变化率" min="0" step="0.01">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">备注说明</label>
            <textarea class="form-textarea" id="formNote" placeholder="可添加备注说明..."></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-normal" onclick="closeAddModal()">
          <i class="fas fa-times"></i>
          取消
        </button>
        <button class="btn btn-primary" onclick="saveNewRecord()">
          <i class="fas fa-save"></i>
          保存
        </button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/auth-helper.js"></script>
  <script src="js/common.js"></script>
  <script>
    AuthHelper.checkAuth();

    var customersMap = {};
    var allCustomers = [];
    var allRecords = [];
    var trendChartInstance = null;
    var pieChartInstance = null;
    var currentTrendRange = '6m';

    function initApp() {
      updateHeaderDate();
      loadAllData();
    }

    function updateHeaderDate() {
      var now = new Date();
      var weekdays = ['日', '一', '二', '三', '四', '五', '六'];
      var dateStr = now.getFullYear() + '年' + (now.getMonth() + 1) + '月' + now.getDate() + '日';
      var weekday = '星期' + weekdays[now.getDay()];
      document.getElementById('headerDate').textContent = '欢迎回来，今天是 ' + dateStr + ' ' + weekday;
    }

    function loadAllData() {
      Promise.all([
        AuthHelper.authFetch('/api/customers').then(function(r) { return r.json(); }),
        AuthHelper.authFetch('/api/records').then(function(r) { return r.json(); }),
        AuthHelper.authFetch('/api/stats').then(function(r) { return r.json(); })
      ]).then(function(results) {
        var customersResult = results[0];
        var recordsResult = results[1];
        var statsResult = results[2];

        if (customersResult.success) {
          allCustomers = customersResult.data;
          customersMap = {};
          allCustomers.forEach(function(c) {
            customersMap[c.id] = c;
          });
        } else {
          allCustomers = [];
          customersMap = {};
        }

        if (recordsResult.success) {
          allRecords = recordsResult.data;
        } else {
          allRecords = [];
        }

        updateStats(statsResult.success ? statsResult.data : null);
        renderCustomerTable();
        renderTrendChart();
        renderPieChart();
        populateCustomerSelect();
      }).catch(function(err) {
        console.error('加载数据失败:', err);
        RickyFinance.showToast('error', '数据加载失败，请检查后端服务是否启动');
      });
    }

    function updateStats(stats) {
      if (!stats) {
        document.getElementById('statTotalValue').textContent = '¥ 0';
        document.getElementById('statTotalChange').innerHTML = '<span>无数据</span>';
        document.getElementById('statCustomerCount').textContent = allCustomers.length;
        document.getElementById('statCustomerChange').innerHTML = '<i class="fas fa-users"></i><span>' + allCustomers.length + ' 位客户</span>';
        document.getElementById('statRecordCount').textContent = allRecords.length;
        document.getElementById('statMonthlyNew').innerHTML = '<i class="fas fa-calendar"></i><span>本月0条</span>';
        document.getElementById('statPendingCount').textContent = '0';
        document.getElementById('statPendingChange').innerHTML = '<i class="fas fa-check-circle"></i><span>状态正常</span>';
        return;
      }

      document.getElementById('statTotalValue').textContent = RickyFinance.formatCurrency(stats.totalValue);

      var rate = stats.totalRate || 0;
      var changeEl = document.getElementById('statTotalChange');
      changeEl.innerHTML = '<i class="fas fa-arrow-' + (rate >= 0 ? 'up' : 'down') + '"></i><span>' + (rate >= 0 ? '+' : '') + rate + '% 总变化率</span>';
      changeEl.className = 'stats-card-change ' + (rate > 0 ? 'positive' : rate < 0 ? 'negative' : '');

      var activeCustomers = stats.activeCustomers || 0;
      document.getElementById('statCustomerCount').textContent = RickyFinance.formatNumber(allCustomers.length);
      document.getElementById('statCustomerChange').innerHTML = '<i class="fas fa-users"></i><span>' + activeCustomers + ' 位活跃客户</span>';

      document.getElementById('statRecordCount').textContent = RickyFinance.formatNumber(stats.totalRecords);
      var monthlyNew = stats.monthlyNew || 0;
      document.getElementById('statMonthlyNew').innerHTML = '<i class="fas fa-calendar"></i><span>本月' + monthlyNew + '条</span>';

      var pendingRecords = allRecords.filter(function(r) { return r.status === 'pending'; }).length;
      document.getElementById('statPendingCount').textContent = RickyFinance.formatNumber(pendingRecords);
      if (pendingRecords > 0) {
        document.getElementById('statPendingChange').innerHTML = '<i class="fas fa-exclamation-circle"></i><span>需及时处理</span>';
        document.getElementById('statPendingChange').className = 'stats-card-change negative';
      } else {
        document.getElementById('statPendingChange').innerHTML = '<i class="fas fa-check-circle"></i><span>状态正常</span>';
        document.getElementById('statPendingChange').className = 'stats-card-change positive';
      }
    }

    function renderTrendChart(range) {
      range = range || currentTrendRange;
      currentTrendRange = range;

      var days = range === '6m' ? 180 : range === '1y' ? 365 : 9999;
      if (range === 'all' && allRecords.length > 0) {
        var dates = allRecords.map(function(r) { return new Date(r.date); }).sort(function(a, b) { return a - b; });
        if (dates.length > 0) {
          var firstDate = dates[0];
          var lastDate = dates[dates.length - 1];
          days = Math.ceil((lastDate - firstDate) / (1000 * 60 * 60 * 24)) + 30;
          days = Math.max(days, 30);
        }
      }

      var labels = [];
      var dataPoints = [];
      var now = new Date();

      var monthMap = {};
      allRecords.forEach(function(r) {
        if (r.status !== 'valid') return;
        var d = new Date(r.date);
        var cutoff = new Date(now);
        cutoff.setDate(cutoff.getDate() - days);
        if (d < cutoff) return;
        var key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
        if (!monthMap[key]) monthMap[key] = 0;
        monthMap[key] += (r.value || 0);
      });

      var keys = Object.keys(monthMap).sort();
      if (keys.length === 0) {
        for (var i = Math.min(days, 6) - 1; i >= 0; i--) {
          var labelDate = new Date(now);
          labelDate.setMonth(labelDate.getMonth() - i);
          labels.push(labelDate.getFullYear() + '年' + (labelDate.getMonth() + 1) + '月');
          dataPoints.push(0);
        }
      } else {
        var startDate = new Date(now);
        startDate.setDate(startDate.getDate() - days);
        var cursor = new Date(startDate.getFullYear(), startDate.getMonth(), 1);
        while (cursor <= now) {
          var cursorKey = cursor.getFullYear() + '-' + String(cursor.getMonth() + 1).padStart(2, '0');
          labels.push(cursor.getFullYear() + '年' + (cursor.getMonth() + 1) + '月');
          dataPoints.push(monthMap[cursorKey] || 0);
          cursor.setMonth(cursor.getMonth() + 1);
        }
      }

      var ctx = document.getElementById('trendChart').getContext('2d');
      if (trendChartInstance) trendChartInstance.destroy();

      trendChartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: '资产总值',
            data: dataPoints,
            borderColor: '#a78bfa',
            backgroundColor: 'rgba(167, 139, 250, 0.1)',
            borderWidth: 2,
            fill: true,
            tension: 0.4,
            pointRadius: 3,
            pointBackgroundColor: '#a78bfa',
            pointHoverRadius: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: true, position: 'top', labels: { color: '#8b8b8b', font: { size: 12 } } },
            tooltip: {
              backgroundColor: '#1a1a2e',
              titleColor: '#eaeaea',
              bodyColor: '#b8b8d0',
              borderColor: '#2a2a4a',
              borderWidth: 1,
              callbacks: {
                label: function(ctx) { return '资产值: ' + RickyFinance.formatCurrency(ctx.raw); }
              }
            }
          },
          scales: {
            x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8b8b8b', maxTicksLimit: 12 } },
            y: {
              grid: { color: 'rgba(255,255,255,0.05)' },
              ticks: { color: '#8b8b8b', callback: function(v) { return v >= 10000 ? '¥' + (v / 10000).toFixed(0) + '万' : '¥' + v; } }
            }
          }
        }
      });
    }

    function switchTrendRange(range, btn) {
      var tabs = document.querySelectorAll('.chart-tab');
      tabs.forEach(function(t) { t.classList.remove('active'); });
      if (btn) btn.classList.add('active');
      renderTrendChart(range);
    }

    function renderPieChart() {
      var typeMap = {};
      var typeColorMap = RickyFinance.ASSET_TYPE_COLORS;
      var typeLabelMap = RickyFinance.ASSET_TYPE_MAP;

      allRecords.forEach(function(r) {
        if (r.status !== 'valid') return;
        var t = r.type || 'other';
        if (!typeMap[t]) typeMap[t] = 0;
        typeMap[t] += (r.value || 0);
      });

      var types = Object.keys(typeMap);
      var labels = types.map(function(t) { return typeLabelMap[t] || t; });
      var data = types.map(function(t) { return typeMap[t]; });
      var colors = types.map(function(t) { return typeColorMap[t] || '#6b7280'; });

      if (types.length === 0) {
        labels = ['暂无数据'];
        data = [1];
        colors = ['#2a2a4a'];
      }

      var ctx = document.getElementById('pieChart').getContext('2d');
      if (pieChartInstance) pieChartInstance.destroy();

      var total = data.reduce(function(a, b) { return a + b; }, 0);

      pieChartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: labels,
          datasets: [{
            data: data,
            backgroundColor: colors,
            borderColor: '#1a1a2e',
            borderWidth: 2
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '60%',
          plugins: {
            legend: {
              position: 'right',
              labels: { color: '#8b8b8b', padding: 15, font: { size: 12 } }
            },
            tooltip: {
              backgroundColor: '#1a1a2e',
              titleColor: '#eaeaea',
              bodyColor: '#b8b8d0',
              borderColor: '#2a2a4a',
              borderWidth: 1,
              callbacks: {
                label: function(ctx) {
                  var value = ctx.raw;
                  if (total === 0) return ctx.label + ': 暂无数据';
                  return ctx.label + ': ' + RickyFinance.formatCurrency(value) + ' (' + ((value / total) * 100).toFixed(1) + '%)';
                }
              }
            }
          }
        }
      });
    }

    function renderCustomerTable() {
      var container = document.getElementById('customerTableBody');

      if (allCustomers.length === 0) {
        container.innerHTML =
          '<div class="empty-state">' +
          '<i class="fas fa-users empty-icon"></i>' +
          '<div class="empty-title">暂无客户数据</div>' +
          '<div class="empty-message">请先在客户管理页面添加客户</div>' +
          '</div>';
        return;
      }

      var customerStats = {};
      allCustomers.forEach(function(c) {
        var id = String(c.id);
        var records = allRecords.filter(function(r) { return String(r.customerId) === id; });
        var validRecords = records.filter(function(r) { return r.status === 'valid'; });
        var totalValue = validRecords.reduce(function(s, r) { return s + (r.value || 0); }, 0);
        var types = {};
        records.forEach(function(r) {
          types[r.type] = true;
        });
        var typeList = Object.keys(types);
        var primaryType = typeList.length > 0 ? typeList[0] : 'other';
        customerStats[id] = {
          totalValue: totalValue,
          recordCount: records.length,
          primaryType: primaryType,
          primaryTypeLabel: RickyFinance.getAssetTypeLabel(primaryType),
          hasRecords: records.length > 0,
          hasPending: records.some(function(r) { return r.status === 'pending'; })
        };
      });

      var rows = allCustomers.map(function(c) {
        var id = String(c.id);
        var stats = customerStats[id];
        var statusClass = stats.hasPending ? 'status-pending' : (stats.hasRecords ? 'status-active' : 'status-inactive');
        var statusText = stats.hasPending ? '待更新' : (stats.hasRecords ? '活跃' : '无记录');
        var statusIcon = stats.hasPending ? 'clock' : (stats.hasRecords ? 'circle' : 'circle');

        return '<div class="table-row">' +
          '<div class="table-cell large">' +
          '<div class="customer-info">' +
          '<div class="customer-avatar">' + (c.shortName || c.name.charAt(0)) + '</div>' +
          '<div>' +
          '<div class="customer-name">' + c.name + '</div>' +
          '<div class="customer-code">' + (c.code || '') + '</div>' +
          '</div>' +
          '</div>' +
          '</div>' +
          '<div class="table-cell">' + stats.primaryTypeLabel + '</div>' +
          '<div class="table-cell small"><span class="asset-value">' + RickyFinance.formatCurrency(stats.totalValue) + '</span></div>' +
          '<div class="table-cell small">' + stats.recordCount + ' 条</div>' +
          '<div class="table-cell small"><span class="status-badge ' + statusClass + '"><i class="fas fa-' + statusIcon + '"></i> ' + statusText + '</span></div>' +
          '<div class="table-cell small">' +
          '<div class="table-actions">' +
          '<a href="customers.html" class="action-btn" title="查看详情"><i class="fas fa-eye"></i></a>' +
          '<button class="action-btn" onclick="RickyFinance.navigateTo(\'records\')" title="查看记录"><i class="fas fa-file-invoice"></i></button>' +
          '</div>' +
          '</div>' +
          '</div>';
      }).join('');

      container.innerHTML = rows;
    }

    function handleSearch() {
      var keyword = document.getElementById('searchInput').value.toLowerCase().trim();
      var rows = document.querySelectorAll('#customerTableBody .table-row');
      rows.forEach(function(row) {
        var text = row.textContent.toLowerCase();
        if (!keyword || text.indexOf(keyword) !== -1) {
          row.style.display = '';
        } else {
          row.style.display = 'none';
        }
      });
    }

    function resetSearch() {
      document.getElementById('searchInput').value = '';
      handleSearch();
      loadAllData();
    }

    function openAddModal() {
      populateCustomerSelect();
      document.getElementById('addRecordForm').reset();
      document.getElementById('formDate').valueAsDate = new Date();
      RickyFinance.openModal('addRecordModal');
    }

    function closeAddModal() {
      RickyFinance.closeModal('addRecordModal');
      document.getElementById('addRecordForm').reset();
    }

    function populateCustomerSelect() {
      var select = document.getElementById('formCustomer');
      var currentVal = select.value;
      select.innerHTML = '<option value="">请选择客户</option>';
      allCustomers.forEach(function(c) {
        select.innerHTML += '<option value="' + c.id + '">' + c.name + ' (' + (c.code || 'C' + String(c.id).padStart(3, '0')) + ')</option>';
      });
      select.value = currentVal;
    }

    function saveNewRecord() {
      var form = document.getElementById('addRecordForm');
      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }

      var data = {
        customerId: document.getElementById('formCustomer').value,
        type: document.getElementById('formType').value,
        name: document.getElementById('formName').value,
        value: parseFloat(document.getElementById('formValue').value),
        date: document.getElementById('formDate').value,
        previousValue: parseFloat(document.getElementById('formPreviousValue').value) || null,
        note: document.getElementById('formNote').value
      };

      AuthHelper.authFetch('/api/records', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      })
      .then(function(res) { return res.json(); })
      .then(function(result) {
        if (result.success) {
          RickyFinance.showToast('success', '记录新增成功！');
          closeAddModal();
          loadAllData();
        } else {
          RickyFinance.showToast('error', result.message || '保存失败');
        }
      })
      .catch(function(err) {
        console.error('保存失败:', err);
        RickyFinance.showToast('error', '网络错误，保存失败');
      });
    }

    document.addEventListener('DOMContentLoaded', initApp);
  </script>
</body>
</html>
