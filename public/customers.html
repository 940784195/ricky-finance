<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客户管理 - 资产管家</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/common.css">
  <style>
    :root {
      --color-highlightBorder: #4ade80;
      --color-adminBadge: #f59e0b;
      --color-userBadge: #3b82f6;
    }

    .sidebar-brand h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--color-pageText);
    }

    .sidebar-nav {
      flex: 1;
      padding: 12px 0;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      cursor: pointer;
      color: var(--color-sidebarItemText);
      transition: all 0.2s ease;
      border-left: 2px solid transparent;
    }

    .nav-item:hover {
      background: var(--color-sidebarItemBackgroundHover);
      color: var(--color-pageText);
    }

    .nav-item.active {
      background: var(--color-sidebarItemBackgroundHover);
      color: var(--color-sidebarItemTextSelected);
      border-left-color: var(--color-buttonPrimaryBackground);
    }

    .nav-item i {
      width: 18px;
      font-size: 16px;
    }

    .sidebar-divider {
      height: 1px;
      background: var(--color-cardBorder);
      margin: 8px 0;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: var(--color-cardBackground);
      border-bottom: 1px solid var(--color-cardBorder);
    }

    .header-title h2 {
      font-size: 20px;
      font-weight: 600;
      color: var(--color-pageText);
      margin-bottom: 2px;
    }

    .header-title p {
      font-size: 13px;
      color: var(--color-pageTextSubdued);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .role-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--color-inputBackground);
      border: 1px solid var(--color-inputBorder);
      border-radius: 10px;
      padding: 4px;
    }

    .role-btn {
      padding: 6px 14px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      background: transparent;
      color: var(--color-pageTextSubdued);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .role-btn.active {
      background: var(--color-buttonPrimaryBackground);
      color: var(--color-buttonPrimaryText);
      box-shadow: 0 2px 8px rgba(139, 92, 246, 0.3);
    }

    .role-btn i {
      font-size: 12px;
    }

    .role-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      margin-left: 8px;
    }

    .role-badge.admin {
      background: rgba(245, 158, 11, 0.15);
      color: var(--color-adminBadge);
    }

    .role-badge.user {
      background: rgba(59, 130, 246, 0.15);
      color: var(--color-userBadge);
    }

    .user-select-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-select-label {
      font-size: 13px;
      color: var(--color-pageTextSubdued);
    }

    .user-select {
      background: var(--color-inputBackground);
      border: 1px solid var(--color-inputBorder);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--color-pageText);
      font-size: 13px;
      outline: none;
      cursor: pointer;
      min-width: 140px;
      transition: all 0.2s ease;
    }

    .user-select:focus {
      border-color: var(--color-inputBorderFocus);
    }

    .user-select option {
      background: var(--color-inputBackground);
      color: var(--color-pageText);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--color-buttonPrimaryBackground);
      color: var(--color-buttonPrimaryText);
      border: 1px solid var(--color-buttonPrimaryBorder);
    }

    .btn-primary:hover {
      background: var(--color-buttonPrimaryBackgroundHover);
      transform: translateY(-0.5px);
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    }

    .btn-normal {
      background: var(--color-buttonNormalBackground);
      color: var(--color-buttonNormalText);
      border: 1px solid var(--color-buttonNormalBorder);
    }

    .btn-normal:hover {
      background: var(--color-buttonNormalBackgroundHover);
      border-color: var(--color-inputBorderFocus);
    }

    .btn-danger {
      background: var(--color-buttonDangerBackground);
      color: var(--color-buttonDangerText);
      border: 1px solid var(--color-buttonDangerBorder);
    }

    .btn-danger:hover {
      background: var(--color-buttonDangerBackgroundHover);
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 13px;
    }

    .header-user {
      display: flex;
      align-items: center;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--color-buttonPrimaryBackground), #6366f1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
      color: white;
    }

    .page-content {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .stats-card {
      background: var(--color-cardBackground);
      border: 1px solid var(--color-cardBorder);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stats-card-header {
      font-size: 13px;
      color: var(--color-pageTextSubdued);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stats-card-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--color-pageText);
    }

    .stats-card-change {
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 4px;
      font-weight: 500;
    }

    .stats-card-change.positive {
      color: var(--color-pageTextPositive);
    }

    .stats-card-change.negative {
      color: var(--color-pageTextNegative);
    }

    .customer-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    .customer-card {
      background: var(--color-cardBackground);
      border: 1px solid var(--color-cardBorder);
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.2s ease;
    }

    .customer-card:hover {
      border-color: var(--color-inputBorderFocus);
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.1);
    }

    .customer-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--color-cardBorder);
      background: rgba(255, 255, 255, 0.02);
    }

    .customer-card-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .customer-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--color-buttonPrimaryBackground), #6366f1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 16px;
      color: white;
    }

    .customer-name-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .customer-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--color-pageText);
    }

    .customer-code {
      font-size: 12px;
      color: var(--color-pageTextSubdued);
    }

    .customer-card-actions {
      display: flex;
      gap: 6px;
    }

    .card-action-btn {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      border: 1px solid var(--color-cardBorder);
      background: transparent;
      color: var(--color-pageTextSubdued);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      font-size: 12px;
    }

    .card-action-btn:hover {
      background: var(--color-buttonNormalBackgroundHover);
      color: var(--color-pageText);
      border-color: var(--color-inputBorderFocus);
    }

    .card-action-btn.delete:hover {
      background: var(--color-buttonDangerBackground);
      color: var(--color-buttonDangerText);
      border-color: var(--color-buttonDangerBorder);
    }

    .customer-card-body {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .customer-stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .customer-stat-label {
      font-size: 13px;
      color: var(--color-pageTextSubdued);
    }

    .customer-stat-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-pageText);
    }

    .customer-card-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--color-cardBorder);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .customer-record-count {
      font-size: 13px;
      color: var(--color-pageTextSubdued);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .customer-view-btn {
      font-size: 13px;
      color: var(--color-pageTextLink);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.2s ease;
    }

    .customer-view-btn:hover {
      color: var(--color-buttonPrimaryBackground);
    }

    .empty-state {
      padding: 60px 20px;
      text-align: center;
      grid-column: 1 / -1;
    }

    .empty-icon {
      font-size: 48px;
      color: var(--color-pageTextSubdued);
      margin-bottom: 16px;
    }

    .empty-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--color-pageText);
      margin-bottom: 8px;
    }

    .empty-message {
      font-size: 14px;
      color: var(--color-pageTextSubdued);
      margin-bottom: 20px;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--color-pageBackgroundModalActive);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--color-modalBackground);
      border: 1px solid var(--color-modalBorder);
      border-radius: 12px;
      width: 90%;
      max-width: 520px;
      overflow: hidden;
      transform: scale(0.95) translateY(20px);
      transition: all 0.3s ease;
    }

    .modal-overlay.active .modal {
      transform: scale(1) translateY(0);
    }

    .modal.wide {
      max-width: 900px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: var(--color-modalHeaderBackground);
      border-bottom: 1px solid var(--color-cardBorder);
    }

    .modal-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--color-pageText);
    }

    .modal-close {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--color-pageTextSubdued);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .modal-close:hover {
      background: var(--color-buttonNormalBackgroundHover);
      color: var(--color-pageText);
    }

    .modal-body {
      padding: 20px;
      max-height: 60vh;
      overflow-y: auto;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 16px 20px;
      background: var(--color-modalFooterBackground);
      border-top: 1px solid var(--color-cardBorder);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--color-pageText);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .form-label.required::after {
      content: '*';
      color: var(--color-pageTextNegative);
    }

    .form-input, .form-select, .form-textarea {
      background: var(--color-inputBackground);
      border: 1px solid var(--color-inputBorder);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--color-inputText);
      font-size: 14px;
      outline: none;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--color-inputBorderFocus);
      background: var(--color-inputBackgroundFocus);
    }

    .form-input::placeholder, .form-textarea::placeholder {
      color: var(--color-inputPlaceholder);
    }

    .form-textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-input:disabled, .form-select:disabled, .form-textarea:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .modal-alert {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 16px;
      border-radius: 8px;
    }

    .modal-alert.warning {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.2);
    }

    .modal-alert i {
      font-size: 20px;
      color: #f59e0b;
      flex-shrink: 0;
    }

    .modal-alert span {
      font-size: 14px;
      color: var(--color-pageTextLight);
      line-height: 1.6;
    }

    .record-row {
      display: grid;
      grid-template-columns: 1.5fr 0.8fr 1fr 0.6fr 0.6fr;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--color-cardBorder);
      align-items: center;
      font-size: 13px;
    }

    .record-row.header-row {
      font-weight: 600;
      color: var(--color-pageTextSubdued);
      border-bottom: 2px solid var(--color-cardBorder);
      padding: 10px 16px;
    }

    .record-row:not(.header-row):hover {
      background: rgba(255, 255, 255, 0.03);
    }

    .record-type-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
    }

    .record-type-tag.stock { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
    .record-type-tag.fund { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
    .record-type-tag.bond { background: rgba(16, 185, 129, 0.15); color: #10b981; }
    .record-type-tag.realestate { background: rgba(236, 72, 153, 0.15); color: #ec4899; }
    .record-type-tag.cash { background: rgba(99, 102, 241, 0.15); color: #6366f1; }
    .record-type-tag.other { background: rgba(107, 114, 128, 0.15); color: #6b7280; }

    .record-value-text {
      font-weight: 600;
    }

    .record-status-dot {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .record-status-dot.valid { color: var(--color-pageTextPositive); }
    .record-status-dot.pending { color: #f59e0b; }
    .record-status-dot.invalid { color: var(--color-pageTextNegative); }

    .detail-empty {
      text-align: center;
      padding: 30px;
      color: var(--color-pageTextSubdued);
      font-size: 14px;
    }

    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 2000;
    }

    .toast {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--color-cardBackground);
      border: 1px solid var(--color-cardBorder);
      border-radius: 10px;
      min-width: 280px;
      max-width: 400px;
      animation: slideIn 0.3s ease;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .toast.slide-out {
      animation: slideOut 0.2s ease;
    }

    .toast i { font-size: 16px; flex-shrink: 0; }
    .toast.success i { color: var(--color-pageTextPositive); }
    .toast.error i { color: var(--color-pageTextNegative); }
    .toast.info i { color: var(--color-pageTextLink); }

    .toast-message {
      font-size: 14px;
      color: var(--color-pageText);
      flex: 1;
    }

    .toast-close {
      background: none;
      border: none;
      color: var(--color-pageTextSubdued);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: all 0.2s ease;
    }

    .toast-close:hover {
      background: var(--color-buttonNormalBackgroundHover);
      color: var(--color-pageText);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(100px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideOut {
      from { opacity: 1; transform: translateX(0px); }
      to { opacity: 0; transform: translateX(100px); }
    }

    @media (max-width: 1024px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .customer-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
        position: fixed;
        z-index: 900;
        left: -100%;
        transition: left 0.3s ease;
      }
      .sidebar.open {
        left: 0;
      }
      .stats-grid {
        grid-template-columns: 1fr;
      }
      .header {
        flex-direction: column;
        gap: 12px;
        align-items: stretch;
      }
      .header-actions {
        flex-wrap: wrap;
      }
      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <i class="fas fa-chart-line"></i>
          <h1>资产管家</h1>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-item" onclick="RickyFinance.navigateTo('overview')">
          <i class="fas fa-home"></i>
          <span>资产概览</span>
        </div>
        <div class="nav-item active" onclick="RickyFinance.navigateTo('customers')">
          <i class="fas fa-users"></i>
          <span>客户管理</span>
        </div>
        <div class="nav-item" onclick="RickyFinance.navigateTo('records')">
          <i class="fas fa-file-invoice"></i>
          <span>资产记录</span>
        </div>
        <div class="nav-item" onclick="RickyFinance.navigateTo('analysis')">
          <i class="fas fa-chart-pie"></i>
          <span>数据分析</span>
        </div>
        <div class="nav-item" onclick="RickyFinance.navigateTo('export')">
          <i class="fas fa-download"></i>
          <span>报表导出</span>
        </div>
        <div class="sidebar-divider"></div>
        <div class="nav-item" onclick="RickyFinance.navigateTo('settings')">
          <i class="fas fa-cog"></i>
          <span>系统设置</span>
        </div>
        <div class="sidebar-divider"></div>
        <div class="nav-item nav-logout" onclick="AuthHelper.logout()" style="color: #f87171;">
          <i class="fas fa-sign-out-alt"></i>
          <span>退出登录</span>
        </div>
      </nav>
    </aside>

    <main class="main-content">
      <header class="header">
        <div class="header-title">
          <h2>客户管理</h2>
          <p id="headerSubtitle">管理所有客户的资产信息</p>
        </div>
        <div class="header-actions">
          <div class="role-toggle" id="roleToggle">
            <button class="role-btn active" id="roleAdminBtn" onclick="switchRole('admin')">
              <i class="fas fa-shield-haltered"></i>
              管理员
            </button>
            <button class="role-btn" id="roleUserBtn" onclick="switchRole('user')">
              <i class="fas fa-user"></i>
              普通用户
            </button>
          </div>
          <div class="user-select-wrapper" id="userSelectWrapper" style="display:none;">
            <span class="user-select-label">当前用户:</span>
            <select class="user-select" id="currentUserSelect" onchange="onCurrentUserChange()">
              <option value="">选择客户身份...</option>
            </select>
          </div>
          <button class="btn btn-primary" id="addCustomerBtn" onclick="openCustomerModal()">
            <i class="fas fa-plus"></i>
            <span>新增客户</span>
          </button>
          <div class="header-user">
            <div class="user-avatar" id="headerAvatar">R</div>
          </div>
        </div>
      </header>

      <div class="page-content">
        <div class="stats-grid">
          <div class="stats-card">
            <div class="stats-card-header">客户总数</div>
            <div class="stats-card-value" id="statsTotalCustomers">0</div>
            <div class="stats-card-change positive" id="statsActiveCustomers">
              <i class="fas fa-users"></i> 活跃 0 位
            </div>
          </div>
          <div class="stats-card">
            <div class="stats-card-header">总资产价值</div>
            <div class="stats-card-value" id="statsTotalValue">¥ 0</div>
            <div class="stats-card-change" id="statsValueChange">
              <i class="fas fa-arrow-up"></i> +0%
            </div>
          </div>
          <div class="stats-card">
            <div class="stats-card-header">资产记录总数</div>
            <div class="stats-card-value" id="statsTotalRecords">0</div>
            <div class="stats-card-change" id="statsRecordChange">
              <i class="fas fa-file-invoice"></i> 0 条
            </div>
          </div>
          <div class="stats-card">
            <div class="stats-card-header">当前角色</div>
            <div class="stats-card-value" id="statsCurrentRole" style="font-size: 22px;">
              <span class="role-badge admin"><i class="fas fa-shield-haltered"></i> 管理员</span>
            </div>
            <div class="stats-card-change" id="statsRoleDesc" style="color: var(--color-pageTextSubdued);">
              可查看所有数据
            </div>
          </div>
        </div>

        <div class="customer-grid" id="customerGrid"></div>
      </div>
    </main>

    <div class="modal-overlay" id="customerModal">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title" id="customerModalTitle">新增客户</span>
          <button class="modal-close" onclick="closeCustomerModal()">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="modal-body">
          <form id="customerForm" novalidate>
            <div class="form-group" style="margin-bottom: 16px;">
              <label class="form-label required">客户名称</label>
              <input type="text" class="form-input" id="formCustomerName" placeholder="请输入客户名称" required>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">客户简称</label>
                <input type="text" class="form-input" id="formCustomerShortName" placeholder="用于头像显示" maxlength="2">
              </div>
              <div class="form-group">
                <label class="form-label">客户编号</label>
                <input type="text" class="form-input" id="formCustomerCode" placeholder="如 C001">
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-normal" onclick="closeCustomerModal()">
            <i class="fas fa-times"></i>
            取消
          </button>
          <button class="btn btn-primary" onclick="saveCustomer()">
            <i class="fas fa-save"></i>
            保存
          </button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="detailModal">
      <div class="modal wide">
        <div class="modal-header">
          <span class="modal-title" id="detailModalTitle">客户资产详情</span>
          <button class="modal-close" onclick="closeDetailModal()">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="modal-body" id="detailModalBody"></div>
        <div class="modal-footer">
          <button class="btn btn-normal" onclick="closeDetailModal()">
            <i class="fas fa-times"></i>
            关闭
          </button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="deleteModal">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">确认删除</span>
          <button class="modal-close" onclick="closeDeleteModal()">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="modal-body">
          <div class="modal-alert warning">
            <i class="fas fa-exclamation-triangle"></i>
            <span>删除该客户将同时删除其所有关联的资产记录，确定要继续吗？</span>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-normal" onclick="closeDeleteModal()">
            <i class="fas fa-times"></i>
            取消
          </button>
          <button class="btn btn-danger" onclick="deleteCustomer()">
            <i class="fas fa-trash"></i>
            确认删除
          </button>
        </div>
      </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

  <script src="js/auth-helper.js"></script>
  <script src="js/common.js"></script>
  <script>
    AuthHelper.checkAuth();

    var API_BASE = '';
    var currentUser = null;
    var allCustomers = [];
    var allRecords = [];
    var editingCustomerId = null;
    var deletingCustomerId = null;

      function initApp() {
        currentUser = AuthHelper.getUser();
        updateHeaderByRole();
        loadAllData();
      }

      function updateHeaderByRole() {
        var isAdmin = currentUser && currentUser.role === 'admin';
        var headerAvatar = document.getElementById('headerAvatar');
        var headerSubtitle = document.getElementById('headerSubtitle');
        var addBtn = document.getElementById('addCustomerBtn');
        var roleBtns = document.getElementById('roleSwitchBtns');

        if (roleBtns) roleBtns.style.display = 'none';

        if (isAdmin) {
          headerAvatar.textContent = 'R';
          headerSubtitle.textContent = '管理所有客户的资产信息';
          if (addBtn) addBtn.style.display = '';
        } else {
          headerAvatar.textContent = 'U';
          headerSubtitle.textContent = currentUser && currentUser.customerName ? '欢迎, ' + currentUser.customerName : '查看我的资产信息';
          if (addBtn) addBtn.style.display = 'none';
        }
      }

      function loadAllData() {
        AuthHelper.authFetch(API_BASE + '/api/customers')
          .then(function(res) { return res.json(); })
          .then(function(result) {
            if (result.success) {
              allCustomers = result.data;
            } else {
              allCustomers = [];
            }
            renderCustomerGrid();
            updateStats();
          })
          .catch(function(err) {
            console.error('加载客户失败:', err);
            allCustomers = [];
            renderCustomerGrid();
            updateStats();
          });
      }

      function loadStatsFromServer() {
        AuthHelper.authFetch(API_BASE + '/api/stats')
          .then(function(res) { return res.json(); })
          .then(function(result) {
            if (result.success && result.data) {
              updateStatsFromServer(result.data);
            }
          })
          .catch(function() {});
      }

      function updateStatsFromServer(stats) {
        document.getElementById('statsTotalValue').textContent = RickyFinance.formatCurrency(stats.totalValue || 0);
        var rate = stats.totalRate || 0;
        var rateEl = document.getElementById('statsValueChange');
        rateEl.innerHTML = '<i class="fas fa-arrow-' + (rate >= 0 ? 'up' : 'down') + '"></i> ' + (rate >= 0 ? '+' : '') + rate + '%';
        rateEl.className = 'stats-card-change ' + (rate >= 0 ? 'positive' : 'negative');

        document.getElementById('statsTotalRecords').textContent = stats.totalRecords || 0;
        document.getElementById('statsRecordChange').innerHTML = '<i class="fas fa-file-invoice"></i> ' + (stats.monthlyNew || 0) + ' 条本月新增';
      }

      function updateStats() {
        document.getElementById('statsTotalCustomers').textContent = allCustomers.length;

        var activeCount = allCustomers.length;
        document.getElementById('statsActiveCustomers').innerHTML = '<i class="fas fa-users"></i> 活跃 ' + activeCount + ' 位';

        if (currentUser && currentUser.role === 'admin') {
          document.getElementById('statsCurrentRole').innerHTML = '<span class="role-badge admin"><i class="fas fa-shield-haltered"></i> 管理员</span>';
          document.getElementById('statsRoleDesc').textContent = '可查看所有客户数据';
        } else {
          document.getElementById('statsCurrentRole').innerHTML = '<span class="role-badge user"><i class="fas fa-user"></i> 普通用户</span>';
          document.getElementById('statsRoleDesc').textContent = currentUser && currentUser.customerName ? '欢迎, ' + currentUser.customerName : '仅查看个人数据';
        }

        loadStatsFromServer();
      }

      function getCustomerName(id) {
        var customer = allCustomers.find(function(c) { return String(c.id) === String(id); });
        return customer ? customer.name : '未知';
      }

      function renderCustomerGrid() {
        var container = document.getElementById('customerGrid');

        if (allCustomers.length === 0) {
          var emptyHtml = '<div class="empty-state">';
          emptyHtml += '<i class="fas fa-users empty-icon"></i>';
          emptyHtml += '<div class="empty-title">暂无客户</div>';
          emptyHtml += '<div class="empty-message">' + (currentUser && currentUser.role === 'admin' ? '点击"新增客户"按钮添加第一个客户' : '当前角色没有可查看的客户') + '</div>';
          if (currentUser && currentUser.role === 'admin') {
            emptyHtml += '<div class="empty-action"><button class="btn btn-primary" onclick="openCustomerModal()"><i class="fas fa-plus"></i> 新增客户</button></div>';
          }
          emptyHtml += '</div>';
          container.innerHTML = emptyHtml;
          return;
        }

        container.innerHTML = allCustomers.map(function(customer) {
          var totalVal = 0;
          var recordCount = 0;
          allRecords.forEach(function(r) {
            if (String(r.customerId) === String(customer.id)) {
              if (r.status === 'valid') totalVal += (r.value || 0);
              recordCount++;
            }
          });

          var card = '';
          card += '<div class="customer-card" data-customer-id="' + customer.id + '">';
          card += '<div class="customer-card-header">';
          card += '<div class="customer-card-info">';
          card += '<div class="customer-avatar">' + (customer.shortName || customer.name.charAt(0)) + '</div>';
          card += '<div class="customer-name-group">';
          card += '<span class="customer-name">' + customer.name + '</span>';
          card += '<span class="customer-code">' + (customer.code || '') + '</span>';
          card += '</div>';
          card += '</div>';
          if (currentUser && currentUser.role === 'admin') {
            card += '<div class="customer-card-actions">';
            card += '<button class="card-action-btn" onclick="event.stopPropagation();editCustomer(' + customer.id + ')" title="编辑"><i class="fas fa-edit"></i></button>';
            card += '<button class="card-action-btn delete" onclick="event.stopPropagation();confirmDeleteCustomer(' + customer.id + ')" title="删除"><i class="fas fa-trash"></i></button>';
            card += '</div>';
          }
          card += '</div>';
          card += '<div class="customer-card-body">';
          card += '<div class="customer-stat-row"><span class="customer-stat-label">总资产价值</span><span class="customer-stat-value">' + RickyFinance.formatCurrency(totalVal) + '</span></div>';
          card += '<div class="customer-stat-row"><span class="customer-stat-label">资产记录</span><span class="customer-stat-value">' + recordCount + ' 条</span></div>';
          card += '<div class="customer-stat-row"><span class="customer-stat-label">客户编号</span><span class="customer-stat-value">' + (customer.code || '-') + '</span></div>';
          card += '</div>';
          card += '<div class="customer-card-footer">';
          card += '<span class="customer-record-count"><i class="fas fa-file-invoice"></i> ID: ' + customer.id + '</span>';
          card += '<span class="customer-view-btn" onclick="event.stopPropagation();viewCustomerDetail(' + customer.id + ')"><i class="fas fa-eye"></i> 查看详情</span>';
          card += '</div>';
          card += '</div>';
          return card;
        }).join('');
      }

      function viewCustomerDetail(customerId) {
        AuthHelper.authFetch(API_BASE + '/api/customers/' + customerId)
          .then(function(res) { return res.json(); })
          .then(function(result) {
            if (!result.success) {
              RickyFinance.showToast('error', '加载客户详情失败');
              return;
            }

            var customer = result.data;
            document.getElementById('detailModalTitle').textContent = customer.name + ' - 资产详情';

            var html = '';
            html += '<div style="margin-bottom:16px;display:flex;gap:16px;flex-wrap:wrap;">';
            html += '<div style="background:var(--color-inputBackground);padding:12px 16px;border-radius:8px;border:1px solid var(--color-cardBorder);">';
            html += '<div style="font-size:12px;color:var(--color-pageTextSubdued);">资产总值</div>';
            html += '<div style="font-size:18px;font-weight:600;">' + RickyFinance.formatCurrency(customer.totalValue) + '</div>';
            html += '</div>';
            html += '<div style="background:var(--color-inputBackground);padding:12px 16px;border-radius:8px;border:1px solid var(--color-cardBorder);">';
            html += '<div style="font-size:12px;color:var(--color-pageTextSubdued);">记录数量</div>';
            html += '<div style="font-size:18px;font-weight:600;">' + customer.recordCount + ' 条</div>';
            html += '</div>';
            html += '<div style="background:var(--color-inputBackground);padding:12px 16px;border-radius:8px;border:1px solid var(--color-cardBorder);">';
            html += '<div style="font-size:12px;color:var(--color-pageTextSubdued);">客户编号</div>';
            html += '<div style="font-size:18px;font-weight:600;">' + (customer.code || '-') + '</div>';
            html += '</div>';
            html += '</div>';

            if (customer.records && customer.records.length > 0) {
              html += '<div class="record-row header-row">';
              html += '<div>资产名称</div><div>类型</div><div>价值</div><div>日期</div><div>状态</div>';
              html += '</div>';
              customer.records.forEach(function(r) {
                var typeLabel = RickyFinance.ASSET_TYPE_MAP[r.type] || r.type;
                var statusIcon = r.status === 'valid' ? 'check-circle' : (r.status === 'pending' ? 'clock' : 'times-circle');
                var statusText = r.status === 'valid' ? '有效' : (r.status === 'pending' ? '待审核' : '无效');
                html += '<div class="record-row">';
                html += '<div style="font-weight:500;">' + r.name + '</div>';
                html += '<div><span class="record-type-tag ' + r.type + '">' + typeLabel + '</span></div>';
                html += '<div class="record-value-text">' + RickyFinance.formatCurrency(r.value) + '</div>';
                html += '<div style="color:var(--color-pageTextSubdued);">' + r.date + '</div>';
                html += '<div><span class="record-status-dot ' + r.status + '">';
                html += '<i class="fas fa-' + statusIcon + '"></i> ' + statusText;
                html += '</span></div>';
                html += '</div>';
              });
            } else {
              html += '<div class="detail-empty"><i class="fas fa-inbox" style="font-size:32px;display:block;margin-bottom:8px;"></i>该客户暂无资产记录</div>';
            }

            document.getElementById('detailModalBody').innerHTML = html;
            document.getElementById('detailModal').classList.add('active');
          })
          .catch(function(err) {
            console.error('加载详情失败:', err);
            RickyFinance.showToast('error', '网络错误，加载详情失败');
          });
      }

      function closeDetailModal() {
        document.getElementById('detailModal').classList.remove('active');
      }

      function switchRole(role) {
        RickyFinance.showToast('info', '角色由登录账号决定，请重新登录切换身份');
      }

      function onCurrentUserChange() {
      }

      function updateUserSelect() {
      }

      function openCustomerModal(customerId) {
        if (currentUser && currentUser.role !== 'admin') {
          RickyFinance.showToast('info', '普通用户无权操作客户');
          return;
        }

        if (customerId) {
          editingCustomerId = customerId;
          var customer = allCustomers.find(function(c) { return String(c.id) === String(customerId); });
          if (!customer) return;

          document.getElementById('customerModalTitle').textContent = '编辑客户';
          document.getElementById('formCustomerName').value = customer.name || '';
          document.getElementById('formCustomerShortName').value = customer.shortName || '';
          document.getElementById('formCustomerCode').value = customer.code || '';
        } else {
          editingCustomerId = null;
          document.getElementById('customerModalTitle').textContent = '新增客户';
          document.getElementById('customerForm').reset();
        }

        document.getElementById('customerModal').classList.add('active');
      }

      function closeCustomerModal() {
        document.getElementById('customerModal').classList.remove('active');
        document.getElementById('customerForm').reset();
        editingCustomerId = null;
      }

      function saveCustomer() {
        var form = document.getElementById('customerForm');
        if (!form.checkValidity()) {
          form.reportValidity();
          return;
        }

        var name = document.getElementById('formCustomerName').value.trim();
        var shortName = document.getElementById('formCustomerShortName').value.trim();
        var code = document.getElementById('formCustomerCode').value.trim();

        if (!name) {
          RickyFinance.showToast('error', '客户名称不能为空');
          return;
        }

        var data = { name: name, shortName: shortName, code: code };
        var url = API_BASE + '/api/customers';
        var method = 'POST';

        if (editingCustomerId) {
          url = API_BASE + '/api/customers/' + editingCustomerId;
          method = 'PUT';
        }

        AuthHelper.authFetch(url, {
          method: method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        })
        .then(function(res) { return res.json(); })
        .then(function(result) {
          if (result.success) {
            RickyFinance.showToast('success', editingCustomerId ? '客户更新成功！' : '客户新增成功！');
            closeCustomerModal();
            loadAllData();
          } else {
            RickyFinance.showToast('error', result.message || '保存失败');
          }
        })
        .catch(function(err) {
          console.error('保存失败:', err);
          RickyFinance.showToast('error', '网络错误，保存失败');
        });
      }

      function editCustomer(id) {
        openCustomerModal(id);
      }

      function confirmDeleteCustomer(id) {
        if (currentUser && currentUser.role !== 'admin') {
          RickyFinance.showToast('info', '普通用户无权删除客户');
          return;
        }
        deletingCustomerId = id;
        document.getElementById('deleteModal').classList.add('active');
      }

      function closeDeleteModal() {
        document.getElementById('deleteModal').classList.remove('active');
        deletingCustomerId = null;
      }

      function deleteCustomer() {
        if (!deletingCustomerId) return;

        AuthHelper.authFetch(API_BASE + '/api/customers/' + deletingCustomerId, { method: 'DELETE' })
          .then(function(res) { return res.json(); })
          .then(function(result) {
            if (result.success) {
              RickyFinance.showToast('success', '客户及关联记录已删除！');
              loadAllData();
            } else {
              RickyFinance.showToast('error', result.message || '删除失败');
            }
          })
          .catch(function(err) {
            console.error('删除失败:', err);
            RickyFinance.showToast('error', '网络错误，删除失败');
          });

        closeDeleteModal();
      }

      document.addEventListener('DOMContentLoaded', initApp);
    </script>
  </body>
</html>
